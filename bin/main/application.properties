spring.application.name=Deu-Shu

# ===============================================================
# [ 茫聝聣茫聜楼茫聝录茫聜路茫聝楼茫聝录 ] 氓聟卤茅聙職茫聜碌茫聝录茫聝聬茫聝录猫篓颅氓庐職
# ===============================================================
# 茫聜碌茫聝录茫聝聬茫聝录茫聛庐茫聝聺茫聝录茫聝聢莽聲陋氓聫路茂录聢氓驴聟猫娄聛茫聛芦氓驴聹茫聛聵茫聛娄氓陇聣忙聸麓茂录聣
server.port=8888

# 茫聝陋茫聜炉茫聜篓茫聜鹿茫聝聢/茫聝卢茫聜鹿茫聝聺茫聝鲁茫聜鹿茫聛庐茫聝聡茫聝聲茫聜漏茫聝芦茫聝聢茫聜篓茫聝鲁茫聜鲁茫聝录茫聝聡茫聜拢茫聝鲁茫聜掳猫篓颅氓庐職
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# ===============================================================
# 1. 茫聝聡茫聝录茫聜驴茫聝聶茫聝录茫聜鹿 (MySQL) & MyBatis 猫篓颅氓庐職
# ===============================================================

# --- JDBC 忙聨楼莽露職忙聝聟氓聽卤 ---
# TODO: DB氓聬聧 / 茫聜垄茫聜芦茫聜娄茫聝鲁茫聝聢 / 茫聝聭茫聜鹿茫聝炉茫聝录茫聝聣茫聛庐氓陇聣忙聸麓氓驴聟茅聽聢
spring.datasource.url=jdbc:mysql://localhost:3306/deushu?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=deushu
spring.datasource.password=1234

# MySQL 8.x 茫聝聣茫聝漏茫聜陇茫聝聬茫聝录
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 茫聜鲁茫聝聧茫聜炉茫聜路茫聝搂茫聝鲁茫聝聴茫聝录茫聝芦 (HikariCP) 茫聜陋茫聝聴茫聜路茫聝搂茫聝鲁 芒聙聯 茫聝聢茫聝漏茫聝聲茫聜拢茫聝聝茫聜炉茫聛芦氓驴聹茫聛聵茫聛娄茫聝聛茫聝楼茫聝录茫聝聥茫聝鲁茫聜掳氓聫炉猫聝陆
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
# --- MyBatis 氓聼潞忙聹卢猫篓颅氓庐職 ---
# Mapper XML 茫聝聲茫聜隆茫聜陇茫聝芦茫聛庐茅聟聧莽陆庐氓聽麓忙聣聙 (盲戮聥: src/main/resources/mappers/)
mybatis.mapper-locations=classpath:/mappers/**/*.xml

# 茫聝聣茫聝隆茫聜陇茫聝鲁茫聝聭茫聝聝茫聜卤茫聝录茫聜赂 (VO/Entity) 茫聛庐茫聜篓茫聜陇茫聝陋茫聜垄茫聜鹿莽聶禄茅聦虏
# 茫聙聬盲驴庐忙颅拢忙赂聢茫聙聭 Java茫聛庐氓聭陆氓聬聧猫娄聫氓聣聡茫聛芦氓戮聯茫聛聞氓聟篓茫聛娄氓掳聫忙聳聡氓颅聴茫聛芦莽碌卤盲赂聙茫聛聴茫聙聛茫聜芦茫聝鲁茫聝聻氓聦潞氓聢聡茫聜聤茫聛搂氓聧聵盲赂聙茫聜颅茫聝录茫聛芦莽碌卤氓聬聢茫聛聴茫聛聧茫聜聤茫聛戮茫聛聴茫聛聼茫聙聜
mybatis.type-aliases-package=com.deushu.member.domain,com.deushu.store.domain,com.deushu.order.domain,com.deushu.review.domain,com.deushu.member.dto,com.deushu.store.dto,com.deushu.order.dto,com.deushu.review.dto

# DB茫聛庐茫聜芦茫聝漏茫聝聽氓聬聧 (snake_case) 芒聠聰 茫聜陋茫聝聳茫聜赂茫聜搂茫聜炉茫聝聢茫聛庐茫聝聲茫聜拢茫聝录茫聝芦茫聝聣氓聬聧 (camelCase) 茫聛庐猫聡陋氓聥聲茫聝聻茫聝聝茫聝聰茫聝鲁茫聜掳茫聜聮忙聹聣氓聤鹿氓聦聳
mybatis.configuration.map-underscore-to-camel-case=true

# SQL茫聝颅茫聜掳茫聛庐氓聡潞氓聤聸猫篓颅氓庐職茂录聢茅聳聥莽聶潞忙聶聜茫聛庐茫聝聡茫聝聬茫聝聝茫聜掳莽聰篓茅聙聰茂录聣
logging.level.org.mybatis=DEBUG
logging.level.com.deushu.mapper=DEBUG
logging.level.org.springframework.jdbc.core=DEBUG

# ===============================================================
# 2. Spring MVC & JSON 猫篓颅氓庐職
# ===============================================================
# 404茫聜篓茫聝漏茫聝录莽聶潞莽聰聼忙聶聜茫聙聛NoHandlerFoundException茫聜聮茫聜鹿茫聝颅茫聝录茫聛聴茫聙聛GlobalExceptionHandler茫聛搂忙篓陋忙聳颅莽職聞茫聛芦忙聧聲忙聧聣茫聛聲茫聛聸茫聜聥
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# JSON莽聸麓氓聢聴氓聦聳忙聶聜茫聛庐茫聝聡茫聝聲茫聜漏茫聝芦茫聝聢猫篓颅氓庐職 (忙聴楼盲禄聵茫聜聮茫聜驴茫聜陇茫聝聽茫聜鹿茫聜驴茫聝鲁茫聝聴氓陆垄氓录聫茫聛芦茫聛聴茫聛陋茫聛聞)
spring.jackson.serialization.write-dates-as-timestamps=false

# ===============================================================
# 3. Spring Security & 茫聜禄茫聝聝茫聜路茫聝搂茫聝鲁莽庐隆莽聬聠猫篓颅氓庐職 (茫聝聶茫聛聲茫聜聯茅聽聵氓聼聼)
#    - JWT茫聛庐氓颅娄莽驴聮茫聜鲁茫聜鹿茫聝聢茫聜聮茅聭聭茫聛驴茫聙聛盲录聺莽碌卤莽職聞茫聛陋茫聜禄茫聝聝茫聜路茫聝搂茫聝鲁茂录聢Cookie茂录聣忙聳鹿氓录聫茫聛赂氓聢聡茫聜聤忙聸驴茫聛聢
# ===============================================================
# 茫聜禄茫聝聝茫聜路茫聝搂茫聝鲁茫聜炉茫聝聝茫聜颅茫聝录茫聛庐氓聬聧氓聣聧茫聜聮茫聝聴茫聝颅茫聜赂茫聜搂茫聜炉茫聝聢氓掳聜莽聰篓茫聛芦忙聵聨莽陇潞莽職聞茫聛芦氓庐職莽戮漏
server.servlet.session.cookie.name=DEUSHUSESSION

# 茫聜禄茫聝聝茫聜路茫聝搂茫聝鲁茫聛庐忙聹聣氓聤鹿忙聹聼茅聶聬猫篓颅氓庐職 (莽搂聮氓聧聵盲陆聧: 3600莽搂聮 = 1忙聶聜茅聳聯)
server.servlet.session.timeout=3600

# 茫聝聲茫聝颅茫聝鲁茫聝聢茫聜篓茫聝鲁茫聝聣(React/Vue茫聛陋茫聛漏)茫聛篓茫聝聬茫聝聝茫聜炉茫聜篓茫聝鲁茫聝聣茫聛庐茫聝聣茫聝隆茫聜陇茫聝鲁茫聛聦莽聲掳茫聛陋茫聜聥氓聽麓氓聬聢茫聙聛
# Cookie茫聜聮忙颅拢氓赂赂茫聛芦茫聜聞茫聜聤氓聫聳茫聜聤茫聛聶茫聜聥茫聛聼茫聜聛茫聛庐茫聜禄茫聜颅茫聝楼茫聝陋茫聝聠茫聜拢猫篓颅氓庐職茂录聢SameSite茂录聣
# 芒聙禄 氓庐聼茅職聸茫聛庐SecurityConfig茫聛搂茫聛庐Cors猫篓颅氓庐職茂录聢AllowCredentials=true茂录聣茫聛篓茅聙拢氓聥聲茫聛聲茫聛聸茫聜聥茫聛聯茫聛篓
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false 
# (茫聝颅茫聝录茫聜芦茫聝芦茅聳聥莽聶潞忙聶聜茫聛炉false茫聙聜HTTPS忙聹卢莽聲陋莽聮掳氓垄聝茫聛搂茫聛炉氓驴聟茫聛職true茫聛芦氓聢聡茫聜聤忙聸驴茫聛聢茫聜聥)

# 芒聙禄 忙鲁篓忙聞聫: BCrypt茫聛芦茫聜聢茫聜聥茫聝聭茫聜鹿茫聝炉茫聝录茫聝聣忙職聴氓聫路氓聦聳茫聛炉茫聝聴茫聝颅茫聝聭茫聝聠茫聜拢猫篓颅氓庐職茫聛搂茫聛炉茫聛陋茫聛聫茫聙聛
# Java茫聜鲁茫聝录茫聝聣氓聛麓茫聛搂 @Bean public PasswordEncoder passwordEncoder() { return new BCryptPasswordEncoder(); }
# 茫聛篓茫聛聴茫聛娄氓庐職莽戮漏茫聛聴茫聛娄盲陆驴茫聛聞氓聢聡茫聜聤茫聛戮茫聛聶茫聙聜

# ===============================================================
# 4. WebClient & PortOne 忙卤潞忙赂聢API猫篓颅氓庐職 (茫聝聭茫聜炉茫聛聲茫聜聯茅聽聵氓聼聼)
# ===============================================================
# 氓陇聳茅聝篓忙卤潞忙赂聢茫聝禄茫聝聢茫聝漏茫聝鲁茫聜露茫聜炉茫聜路茫聝搂茫聝鲁API茅聙職盲驴隆莽聰篓 (WebFlux盲陆驴莽聰篓)
logging.level.org.springframework.web.reactive.function.client=INFO

# PortOne (忙聴搂Iamport) API 猫陋聧猫篓录忙聝聟氓聽卤
# TODO: 莽庐隆莽聬聠猫聙聟茫聝聙茫聝聝茫聜路茫聝楼茫聝聹茫聝录茫聝聣茫聛搂莽聶潞猫隆聦茫聛聲茫聜聦茫聛聼茫聙聦REST API Key茫聙聧茫聛篓茫聙聦REST API Secret茫聙聧茫聛芦忙聸赂茫聛聧忙聫聸茫聛聢茫聜聥茫聛聯茫聛篓
deushu.portone.api-key=YOUR_PORTONE_REST_API_KEY
deushu.portone.api-secret=YOUR_PORTONE_REST_API_SECRET

# ===============================================================
# 5. AWS S3 茅聙拢忙聬潞猫篓颅氓庐職 (茫聝娄茫聛聲茫聜聯茅聽聵氓聼聼)
# ===============================================================
# TODO: 氓庐聼茅職聸茫聛芦莽聶潞猫隆聦茫聛聲茫聜聦茫聛聼IAM茫聛庐 Access Key / Secret Key / 茫聝聬茫聜卤茫聝聝茫聝聢氓聬聧茫聛芦忙聸赂茫聛聧忙聫聸茫聛聢茫聜聥茫聛聯茫聛篓
cloud.aws.credentials.accessKey=YOUR_AWS_ACCESS_KEY
cloud.aws.credentials.secretKey=YOUR_AWS_SECRET_KEY
cloud.aws.region.static=ap-northeast-2
cloud.aws.stack.auto=false

# S3 茫聝聬茫聜卤茫聝聝茫聝聢氓聬聧茫聛聤茫聜聢茫聛鲁茫聝卢茫聝聯茫聝楼茫聝录莽聰禄氓聝聫盲驴聺氓颅聵莽聰篓茫聝聴茫聝卢茫聝聲茫聜拢茫聝聝茫聜炉茫聜鹿
deushu.s3.bucket-name=deushu-image-bucket
deushu.s3.review-prefix=reviews/
spring.thymeleaf.cache=false
# ===============================================================
# 6. Devtools & 茫聝聴茫聝颅茫聝聲茫聜隆茫聜陇茫聝芦
# ===============================================================
# 茫聜陆茫聝录茫聜鹿茫聜鲁茫聝录茫聝聣氓陇聣忙聸麓忙聶聜茫聛庐猫聡陋氓聥聲氓聠聧猫碌路氓聥聲(Live Reload)茫聜聮忙聹聣氓聤鹿氓聦聳
spring.devtools.restart.enabled=true

# 茫聝聠茫聝鲁茫聝聴茫聝卢茫聝录茫聝聢/茅聺聶莽職聞茫聝陋茫聜陆茫聝录茫聜鹿茫聛庐茫聜颅茫聝拢茫聝聝茫聜路茫聝楼茫聜聮莽聞隆氓聤鹿氓聦聳茂录聢茅聳聥莽聶潞氓聤鹿莽聨聡氓聬聭盲赂聤茫聛庐茫聛聼茫聜聛茂录聣
spring.web.resources.cache.period=0

# 茫聜垄茫聜炉茫聝聠茫聜拢茫聝聳茫聛陋茫聝聴茫聝颅茫聝聲茫聜隆茫聜陇茫聝芦茂录聢dev / prod 茫聛庐氓聢聡茫聜聤氓聢聠茫聛聭莽聰篓茂录聣
spring.profiles.active=dev

# ===============================================================
# 7. 茫聛聺茫聛庐盲禄聳茫聛庐茫聝颅茫聜掳茫聝卢茫聝聶茫聝芦猫篓颅氓庐職
# ===============================================================
logging.level.root=INFO
logging.level.com.deushu=DEBUG