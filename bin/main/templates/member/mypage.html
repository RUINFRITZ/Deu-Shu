<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マイページ — ドゥーシュー</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@700;900&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/style.css}">

<style>
/* =============================================
   마이페이지 레이아웃
============================================= */

.mypage-wrap {
    max-width: 1100px;
    margin: 2.5rem auto;
    padding: 0 2rem;
    display: flex;
    gap: 2rem;
    align-items: flex-start;
}

/* =============================================
   사이드바
============================================= */

.mypage-sidebar {
    width: 220px;
    flex-shrink: 0;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    position: sticky;
    top: 5rem;
}

.sidebar-profile {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-mid) 100%);
    padding: 1.5rem 1.2rem;
    text-align: center;
    color: #fff;
}

.sidebar-profile .profile-icon {
    font-size: 2.8rem;
    margin-bottom: 0.5rem;
    opacity: 0.9;
}

.sidebar-profile .profile-name {
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.02em;
}

.sidebar-profile .profile-email {
    font-size: 0.75rem;
    opacity: 0.8;
    margin-top: 0.2rem;
    word-break: break-all;
}

.sidebar-nav {
    padding: 0.5rem 0;
}

.sidebar-nav-item {
    display: flex;
    align-items: center;
    gap: 0.65rem;
    width: 100%;
    padding: 0.85rem 1.2rem;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.875rem;
    color: var(--charcoal);
    background: none;
    border: none;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    text-align: left;
    text-decoration: none;
}

.sidebar-nav-item i {
    font-size: 1rem;
    width: 1.2rem;
    color: var(--light-gray);
    transition: color 0.15s;
}

.sidebar-nav-item:hover {
    background: var(--primary-pale);
    color: var(--primary);
}

.sidebar-nav-item:hover i {
    color: var(--primary);
}

.sidebar-nav-item.active {
    background: var(--primary-pale);
    color: var(--primary);
    font-weight: 700;
}

.sidebar-nav-item.active i {
    color: var(--primary);
}

.sidebar-divider {
    height: 1px;
    background: var(--border);
    margin: 0.4rem 0;
}

.sidebar-nav-item.danger {
    color: var(--error);
}

.sidebar-nav-item.danger i {
    color: var(--error);
}

.sidebar-nav-item.danger:hover {
    background: var(--error-bg);
}

/* =============================================
   메인 콘텐츠
============================================= */

.mypage-main {
    flex: 1;
    min-width: 0;
}

.mypage-section {
    display: none;
}

.mypage-section.active {
    display: block;
}

.section-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--charcoal);
    margin-bottom: 1.5rem;
    padding-bottom: 0.75rem;
    border-bottom: 2px solid var(--primary);
}

/* =============================================
   기본 정보 카드
============================================= */

.info-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.8rem;
    margin-bottom: 1.2rem;
}

.info-card-title {
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--light-gray);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 1.2rem;
}

.info-row {
    display: flex;
    align-items: center;
    padding: 0.85rem 0;
    border-bottom: 1px solid #f3f4f6;
    gap: 1rem;
}

.info-row:last-child {
    border-bottom: none;
    padding-bottom: 0;
}

.info-label {
    font-size: 0.8rem;
    color: var(--mid-gray);
    width: 120px;
    flex-shrink: 0;
}

.info-value {
    font-size: 0.925rem;
    color: var(--charcoal);
    font-weight: 500;
    flex: 1;
}

.info-edit-btn {
    font-size: 0.8rem;
    color: var(--primary);
    background: none;
    border: 1px solid var(--primary);
    border-radius: 5px;
    padding: 0.3rem 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
}

.info-edit-btn:hover {
    background: var(--primary);
    color: #fff;
}

/* 정보수정 섹션 레이아웃 */
.edit-row {
    display: flex;
    align-items: flex-end;
    gap: 1.5rem;
}

.edit-field-group {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0;
}

.edit-field-group .fg {
    margin-bottom: 0.8rem;
}

.edit-field-group .fg:last-child {
    margin-bottom: 0;
}

/* 수정 폼 */
.edit-form {
    display: grid;
    grid-template-rows: 0fr;
    opacity: 0;
    margin-top: 0;
    padding-top: 0;
    border-top: 0px solid var(--border);
    transition: grid-template-rows 0.35s ease, opacity 0.3s ease, margin-top 0.35s ease, padding-top 0.35s ease, border-top-width 0.35s ease;
    overflow: hidden;
}

.edit-form > .edit-form-inner {
    min-height: 0;
}

.edit-form.active {
    grid-template-rows: 1fr;
    opacity: 1;
    margin-top: 1.2rem;
    padding-top: 1.2rem;
    border-top: 1px solid var(--border);
}

.edit-form .fg {
    margin-bottom: 1rem;
}

.edit-form label {
    display: block;
    font-size: 0.8rem;
    color: var(--mid-gray);
    margin-bottom: 0.4rem;
}

.edit-form input {
    width: 100%;
    padding: 0.6rem 0.9rem;
    border: 1px solid var(--border-input);
    border-radius: 6px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.875rem;
    color: var(--charcoal);
    transition: border-color 0.15s;
}

.edit-form input:focus {
    outline: none;
    border-color: var(--primary);
}

.edit-form-btns {
    display: flex;
    gap: 0.6rem;
    margin-top: 1rem;
}

.btn-save {
    padding: 0.55rem 1.4rem;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
}

.btn-save:hover {
    background: var(--primary-mid);
}

.btn-cancel {
    padding: 0.55rem 1.4rem;
    background: none;
    color: var(--mid-gray);
    border: 1px solid var(--border-input);
    border-radius: 6px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.875rem;
    cursor: pointer;
    transition: all 0.15s;
}

.btn-cancel:hover {
    border-color: var(--mid-gray);
    color: var(--charcoal);
}

/* =============================================
   정보수정 모달
============================================= */
.edit-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 2000;
    align-items: center;
    justify-content: center;
}

.edit-overlay.open {
    display: flex;
    animation: fadeIn 0.2s ease;
}

.edit-modal {
    background: #fff;
    border-radius: 14px;
    width: 100%;
    max-width: 440px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.18);
    animation: modalUp 0.25s ease;
    overflow: hidden;
}

.edit-modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.2rem 1.5rem;
    border-bottom: 1px solid var(--border);
}

.edit-modal-header h3 {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--charcoal);
}

.edit-modal-close {
    background: none;
    border: none;
    font-size: 1rem;
    color: var(--light-gray);
    cursor: pointer;
    transition: color 0.15s;
}

.edit-modal-close:hover {
    color: var(--charcoal);
}

.edit-modal-body {
    padding: 1.5rem;
}

/* 탭 */
.edit-tabs {
    display: flex;
    gap: 0.3rem;
    margin-bottom: 1.5rem;
    background: #f3f4f6;
    border-radius: 8px;
    padding: 0.3rem;
}

.edit-tab {
    flex: 1;
    padding: 0.5rem 0.3rem;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--mid-gray);
    background: none;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
}

.edit-tab.active {
    background: #fff;
    color: var(--primary);
    font-weight: 700;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}

/* 탭 패널 */
.edit-tab-panel .fg {
    margin-bottom: 1rem;
}

.edit-tab-panel label {
    display: block;
    font-size: 0.8rem;
    color: var(--mid-gray);
    margin-bottom: 0.4rem;
}

.edit-tab-panel input {
    width: 100%;
    padding: 0.6rem 0.9rem;
    border: 1px solid var(--border-input);
    border-radius: 6px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.875rem;
    color: var(--charcoal);
    transition: border-color 0.15s;
}

.edit-tab-panel input:focus {
    outline: none;
    border-color: var(--primary);
}

.edit-modal-body .fg {
    margin-bottom: 1rem;
}

.edit-modal-body label {
    display: block;
    font-size: 0.8rem;
    color: var(--mid-gray);
    margin-bottom: 0.4rem;
}

.edit-modal-body input {
    width: 100%;
    padding: 0.6rem 0.9rem;
    border: 1px solid var(--border-input);
    border-radius: 6px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.875rem;
    color: var(--charcoal);
    transition: border-color 0.15s;
}

.edit-modal-body input:focus {
    outline: none;
    border-color: var(--primary);
}

.edit-modal-body .name-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.6rem;
}

.edit-modal-divider {
    font-size: 0.78rem;
    color: var(--light-gray);
    border-top: 1px solid var(--border);
    padding-top: 1rem;
    margin: 0.5rem 0 1rem;
    letter-spacing: 0.03em;
}

.required {
    color: var(--error);
    font-size: 0.75rem;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
}

@keyframes modalUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
}

/* =============================================
   ESG 포인트
============================================= */

.esg-card {
    background: linear-gradient(135deg, #064e3b 0%, #065f46 100%);
    border-radius: 12px;
    padding: 2rem;
    color: #fff;
    margin-bottom: 1.2rem;
    position: relative;
    overflow: hidden;
}

.esg-card::before {
    content: '🌳';
    position: absolute;
    right: 1.5rem;
    top: 50%;
    transform: translateY(-50%);
    font-size: 5rem;
    opacity: 0.15;
}

.esg-label {
    font-size: 0.8rem;
    opacity: 0.8;
    letter-spacing: 0.06em;
    margin-bottom: 0.5rem;
}

.esg-point {
    font-size: 2.8rem;
    font-weight: 900;
    font-family: 'Noto Serif JP', serif;
    line-height: 1;
}

.esg-point span {
    font-size: 1rem;
    font-weight: 400;
    opacity: 0.8;
    margin-left: 0.3rem;
}

.esg-desc {
    font-size: 0.8rem;
    opacity: 0.7;
    margin-top: 0.6rem;
}

/* =============================================
   준비중 섹션
============================================= */

.coming-soon {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4rem 2rem;
    text-align: center;
    color: var(--light-gray);
}

.coming-soon i {
    font-size: 3rem;
    margin-bottom: 1rem;
    display: block;
}

.coming-soon p {
    font-size: 0.925rem;
}

/* =============================================
   회원 탈퇴
============================================= */

.danger-card {
    background: #fff;
    border: 1px solid #fecaca;
    border-radius: 12px;
    padding: 1.8rem;
}

.danger-card-title {
    font-size: 1rem;
    font-weight: 700;
    color: var(--error);
    margin-bottom: 0.75rem;
}

.danger-card p {
    font-size: 0.875rem;
    color: var(--mid-gray);
    line-height: 1.7;
    margin-bottom: 1.2rem;
}

.btn-danger {
    padding: 0.6rem 1.5rem;
    background: none;
    color: var(--error);
    border: 1px solid var(--error);
    border-radius: 6px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
}

.btn-danger:hover {
    background: var(--error);
    color: #fff;
}
</style>
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="mypage-wrap">

    <!-- 사이드바 -->
    <aside class="mypage-sidebar">

        <!-- 프로필 요약 -->
        <div class="sidebar-profile">
            <div class="profile-icon"><i class="bi bi-person-circle"></i></div>
            <div class="profile-name" id="sidebarName">로딩 중...</div>
            <div class="profile-email" id="sidebarEmail"></div>
        </div>

        <!-- 메뉴 -->
        <nav class="sidebar-nav">
            <button class="sidebar-nav-item active" onclick="switchSection('info', this)">
                <i class="bi bi-person"></i> 基本情報
            </button>
            <button class="sidebar-nav-item" onclick="switchSection('orders', this)">
                <i class="bi bi-bag"></i> 注文履歴
            </button>
            <button class="sidebar-nav-item" onclick="switchSection('esg', this)">
                <i class="bi bi-tree"></i> ESGポイント
            </button>
            <button class="sidebar-nav-item" onclick="switchSection('favorites', this)">
                <i class="bi bi-heart"></i> お気に入り
            </button>
            <div class="sidebar-divider"></div>
            <button class="sidebar-nav-item danger" onclick="switchSection('withdraw', this)">
                <i class="bi bi-person-x"></i> 会員退会
            </button>
        </nav>
    </aside>

    <!-- 메인 콘텐츠 -->
    <main class="mypage-main">

        <!-- 기본 정보 -->
        <section class="mypage-section active" id="section-info">
            <h2 class="section-title">基本情報</h2>

            <div class="info-card">
                <div class="info-card-title">アカウント情報</div>
                <div class="info-row">
                    <span class="info-label">メールアドレス</span>
                    <span class="info-value" id="infoEmail">—</span>
                </div>
                <div class="info-row">
                    <span class="info-label">お名前</span>
                    <span class="info-value" id="infoName">—</span>
                </div>
                <div class="info-row">
                    <span class="info-label">フリガナ</span>
                    <span class="info-value" id="infoKana">—</span>
                </div>
                <div class="info-row">
                    <span class="info-label">電話番号</span>
                    <span class="info-value" id="infoPhone">—</span>
                </div>
            </div>

            <div style="text-align:right; margin-top: 0.5rem;">
                <button class="info-edit-btn" style="font-size:0.875rem; padding:0.5rem 1.2rem;"
                    onclick="openEditModal()">
                    <i class="bi bi-pencil-square"></i> 情報を修正する
                </button>
            </div>
        </section>

        <!-- 주문 내역 (미구현) -->
        <section class="mypage-section" id="section-orders">
            <h2 class="section-title">注文履歴</h2>
            <div class="coming-soon">
                <i class="bi bi-bag-x"></i>
                <p>注文履歴機能は準備中です</p>
            </div>
        </section>

        <!-- ESG 포인트 (미구현) -->
        <section class="mypage-section" id="section-esg">
            <h2 class="section-title">ESGエコポイント</h2>
            <div class="esg-card">
                <div class="esg-label">保有ポイント</div>
                <div class="esg-point" id="esgPoint">0<span>pt</span></div>
                <div class="esg-desc">フードロスを減らすたびにポイントが貯まります 🌱</div>
            </div>
            <div class="coming-soon">
                <i class="bi bi-clock-history"></i>
                <p>ポイント履歴機能は準備中です</p>
            </div>
        </section>

        <!-- 찜한 가게 (미구현) -->
        <section class="mypage-section" id="section-favorites">
            <h2 class="section-title">お気に入り</h2>
            <div class="coming-soon">
                <i class="bi bi-heart"></i>
                <p>お気に入り機能は準備中です</p>
            </div>
        </section>

        <!-- 회원 탈퇴 -->
        <section class="mypage-section" id="section-withdraw">
            <h2 class="section-title">会員退会</h2>
            <div class="danger-card">
                <div class="danger-card-title">退会する前にご確認ください</div>
                <p>
                    退会すると、ご注文履歴・ESGポイント・お気に入りなど<br>
                    すべてのデータが削除され、復元できません。<br>
                    本当に退会しますか？
                </p>
                <button class="btn-danger" onclick="handleWithdraw()">
                    <i class="bi bi-person-x"></i> 退会する
                </button>
            </div>
        </section>

    </main>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<!-- 정보수정 모달 -->
<div class="edit-overlay" id="editOverlay" onclick="handleEditOverlayClick(event)">
    <div class="edit-modal" id="editModal">

        <div class="edit-modal-header">
            <h3>情報修正</h3>
            <button class="edit-modal-close" onclick="closeEditModal()">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>

        <div class="edit-modal-body">

            <!-- 이름 -->
            <div class="fg">
                <label>お名前 <span class="required">*</span></label>
                <div class="name-grid">
                    <input type="text" id="editLastName" placeholder="田中（姓）">
                    <input type="text" id="editFirstName" placeholder="一郎（名）">
                </div>
            </div>

            <!-- 후리가나 -->
            <div class="fg">
                <label>フリガナ <span class="required">*</span></label>
                <div class="name-grid">
                    <input type="text" id="editLastNameKana" placeholder="タナカ（セイ）">
                    <input type="text" id="editFirstNameKana" placeholder="イチロウ（メイ）">
                </div>
            </div>

            <!-- 전화번호 -->
            <div class="fg">
                <label>電話番号 <span class="required">*</span></label>
                <input type="tel" id="editPhone" placeholder="例: 090-1234-5678">
            </div>

            <div class="edit-modal-divider">パスワード変更（変更しない場合は空欄）</div>

            <!-- 비밀번호 -->
            <div class="fg">
                <label>現在のパスワード</label>
                <input type="password" id="currentPw" placeholder="現在のパスワードを入力">
            </div>
            <div class="fg">
                <label>新しいパスワード</label>
                <input type="password" id="newPw" placeholder="新しいパスワードを入力">
            </div>
            <div class="fg">
                <label>新しいパスワード（確認）</label>
                <input type="password" id="newPwConfirm" placeholder="もう一度入力">
            </div>

            <button class="btn-save" style="width:100%; margin-top:0.5rem;" onclick="handleSaveAll()">保存する</button>

        </div>
    </div>
</div>

<script>
// 섹션 전환
function switchSection(name, btn) {
    document.querySelectorAll('.mypage-section').forEach(function(s) {
        s.classList.remove('active');
    });
    document.querySelectorAll('.sidebar-nav-item').forEach(function(b) {
        b.classList.remove('active');
    });
    document.getElementById('section-' + name).classList.add('active');
    if (btn) btn.classList.add('active');
}

// 정보수정 모달 열기
function openEditModal() {
    document.getElementById('editOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
}

// 정보수정 모달 닫기
function closeEditModal() {
    document.getElementById('editOverlay').classList.remove('open');
    document.body.style.overflow = '';
}

// 오버레이 클릭 시 닫기
function handleEditOverlayClick(e) {
    if (e.target === document.getElementById('editOverlay')) closeEditModal();
}

// 탭 전환
function switchEditTab(name, btn) {
    document.querySelectorAll('.edit-tab').forEach(function(t) { t.classList.remove('active'); });
    document.querySelectorAll('.edit-tab-panel').forEach(function(p) { p.classList.remove('active'); });
    btn.classList.add('active');
    document.getElementById('editTab-' + name).classList.add('active');
}

// 한번에 저장 — PUT /api/auth/update
function handleSaveAll() {
    var lastName      = document.getElementById('editLastName').value.trim();
    var firstName     = document.getElementById('editFirstName').value.trim();
    var lastNameKana  = document.getElementById('editLastNameKana').value.trim();
    var firstNameKana = document.getElementById('editFirstNameKana').value.trim();
    var phone         = document.getElementById('editPhone').value.trim();
    var currentPw     = document.getElementById('currentPw').value;
    var newPw         = document.getElementById('newPw').value;
    var newPwConfirm  = document.getElementById('newPwConfirm').value;

    if (!lastName || !firstName)         { alert('お名前を入力してください'); return; }
    if (!lastNameKana || !firstNameKana) { alert('フリガナを入力してください'); return; }
    if (!phone)                          { alert('電話番号を入力してください'); return; }

    // 현재 비밀번호 입력 시 새 비밀번호도 반드시 입력해야 함
    if (currentPw && !newPw) { alert('新しいパスワードを入力してください'); return; }
    // 새 비밀번호 입력 시 현재 비밀번호도 반드시 입력해야 함
    if (newPw && !currentPw) { alert('現在のパスワードを入力してください'); return; }
    // 새 비밀번호와 확인 비밀번호 일치 여부 확인
    if (newPw && newPw !== newPwConfirm) { alert('新しいパスワードが一致しません'); return; }

    fetch('/api/auth/update', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ lastName, firstName, lastNameKana, firstNameKana, phone, currentPw, newPw })
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
        if (data.success) {
            closeEditModal();
            showToast('情報が更新されました', 'success');
            // 화면 정보 즉시 갱신
            document.getElementById('infoName').textContent  = lastName + ' ' + firstName;
            document.getElementById('infoKana').textContent  = lastNameKana + ' ' + firstNameKana;
            document.getElementById('infoPhone').textContent = phone;
            document.getElementById('sidebarName').textContent = lastName + firstName + ' 様';
            updateHeaderAuth();
        } else {
            showToast(data.message || '更新に失敗しました', 'error');
        }
    })
    .catch(function() { showToast('サーバーエラーが発生しました', 'error'); });
}// 페이지 로드 시 회원 정보 불러오기
document.addEventListener('DOMContentLoaded', function() {

        // 기본 정보

        document.getElementById('editFirstNameKana').value = data.firstNameKana || '';

// 회원 탈퇴 — POST /api/auth/withdraw
function handleWithdraw() {
    if (!confirm('本当に退会しますか？この操作は取り消せません。')) return;
    fetch('/api/auth/withdraw', { method: 'POST' })
    .then(function(res) { return res.json(); })
    .then(function(data) {
        if (data.success) {
            showToast('退会が完了しました', 'success');
            setTimeout(function() { location.href = '/'; }, 1500);
        } else {
            showToast(data.message || '退会に失敗しました', 'error');
        }
    })
    .catch(function() { showToast('サーバーエラーが発生しました', 'error'); });
}
