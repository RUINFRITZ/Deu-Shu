<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<body>
<header class="site-header" th:fragment="header">
    <div class="header-inner">

        <!-- 로고 영역 -->
        <a th:href="@{/}" class="logo-wrap">
            <span class="logo-main">드슈</span>
            <span class="logo-sub">ドゥーシュー</span>
        </a>

<!-- PC 네비게이션 메뉴 -->
<nav class="nav-desktop">
<!--  리스트 페이지로 지역명 파라미터 전달-->
    <!-- 都心: 千代田・中央・港 -->
    <div class="nav-item">
        <a th:href="@{/list(region='toshin', radius=2)}" class="nav-link">都心</a>
        <div class="dropdown">
            <a th:href="@{/list(region='chiyoda', radius=2)}">千代田区</a>
            <a th:href="@{/list(region='chuo', radius=2)}">中央区</a>
            <a th:href="@{/list(region='minato', radius=2)}">港区</a>
        </div>
    </div>

    <!-- 城南: 品川・目黒・大田・世田谷 -->
    <div class="nav-item">
        <a th:href="@{/list(region='jonan', radius=2)}" class="nav-link">城南</a>
        <div class="dropdown">
            <a th:href="@{/list(region='shinagawa', radius=2)}">品川区</a>
            <a th:href="@{/list(region='meguro', radius=2)}">目黒区</a>
            <a th:href="@{/list(region='ota', radius=2)}">大田区</a>
            <a th:href="@{/list(region='setagaya', radius=2)}">世田谷区</a>
        </div>
    </div>

    <!-- 城西: 新宿・渋谷・中野・杉並・練馬 -->
    <div class="nav-item">
        <a th:href="@{/list(region='josei', radius=2)}" class="nav-link">城西</a>
        <div class="dropdown">
            <a th:href="@{/list(region='shinjuku', radius=2)}">新宿区</a>
            <a th:href="@{/list(region='shibuya', radius=2)}">渋谷区</a>
            <a th:href="@{/list(region='nakano', radius=2)}">中野区</a>
            <a th:href="@{/list(region='suginami', radius=2)}">杉並区</a>
            <a th:href="@{/list(region='nerima', radius=2)}">練馬区</a>
        </div>
    </div>

    <!-- 城北: 文京・豊島・北・板橋・足立 -->
    <div class="nav-item">
        <a th:href="@{/list(region='johoku', radius=2)}" class="nav-link">城北</a>
        <div class="dropdown">
            <a th:href="@{/list(region='bunkyo', radius=2)}">文京区</a>
            <a th:href="@{/list(region='toshima', radius=2)}">豊島区</a>
            <a th:href="@{/list(region='kita', radius=2)}">北区</a>
            <a th:href="@{/list(region='itabashi', radius=2)}">板橋区</a>
            <a th:href="@{/list(region='adachi', radius=2)}">足立区</a>
        </div>
    </div>

    <!-- 城東: 台東・墨田・江東・葛飾・江戸川 -->
    <div class="nav-item">
        <a th:href="@{/list(region='joto', radius=2)}" class="nav-link">城東</a>
        <div class="dropdown">
            <a th:href="@{/list(region='taito', radius=2)}">台東区</a>
            <a th:href="@{/list(region='sumida', radius=2)}">墨田区</a>
            <a th:href="@{/list(region='koto', radius=2)}">江東区</a>
            <a th:href="@{/list(region='katsushika', radius=2)}">葛飾区</a>
            <a th:href="@{/list(region='edogawa', radius=2)}">江戸川区</a>
        </div>
    </div>
</nav>

        <!-- 헤더 오른쪽: 로그인 버튼 + 모바일 메뉴 버튼 -->
        <div class="header-actions">
            <!--
                onclick="openModal('user')" :
                버튼 클릭시 JavaScript 함수 실행 → 모달 팝업이 열림
            -->
            <button class="btn-auth" onclick="openModal('user')">
                ログイン / 会員登録
            </button>
            <!-- 모바일용 햄버거 버튼 (CSS에서 모바일일 때만 보임) -->
            <button class="btn-menu">
                <i class="bi bi-list"></i>
            </button>
        </div>
    </div>


<!-- 로그인/회원가입 모달 — 헤더에 포함되어 모든 페이지에서 공통 사용 -->
<div class="auth-overlay" id="authOverlay" onclick="handleOverlayClick(event)">
<div class="auth-modal" id="authModal">

    <!-- 모달 닫기 버튼 -->
    <button class="modal-close" onclick="closeModal()">
        <i class="bi bi-x-lg"></i>
    </button>

    <!-- 탭 버튼 영역 (JS로 동적 생성) -->
    <div class="tab-header" id="tabHeader"></div>

    <!-- [패널 1] 일반회원 로그인 — API: POST /api/auth/login -->
    <div id="panelLogin" class="modal-body-wrap" style="display:none;">

        <!-- 이메일 입력 -->
        <div class="fg">
            <label class="form-label-jp">
                <i class="bi bi-envelope" style="color:var(--primary-light);font-size:0.85rem;"></i>
                メールアドレス <span class="required">*</span>
            </label>
            <input type="email" class="form-input" id="loginEmail"
                placeholder="登録済みのメールアドレス"
                oninput="clearFieldError('loginEmail')">
            <p class="field-msg error" id="loginEmailMsg"></p>
        </div>

        <!-- 비밀번호 입력 -->
        <div class="fg">
            <label class="form-label-jp">
                <i class="bi bi-lock" style="color:var(--primary-light);font-size:0.85rem;"></i>
                パスワード <span class="required">*</span>
            </label>
            <div class="pw-wrap">
                <input type="password" class="form-input" id="loginPw"
                    placeholder="パスワードを入力"
                    oninput="clearFieldError('loginPw')">
                <button class="pw-toggle" onclick="togglePw('loginPw',this)">
                    <i class="bi bi-eye"></i>
                </button>
            </div>
            <p class="field-msg error" id="loginPwMsg"></p>
        </div>

        <!-- 이메일 저장 체크박스 -->
        <div class="save-id-wrap">
            <input type="checkbox" id="saveEmail">
            <label for="saveEmail">メールアドレスを保存する</label>
        </div>

        <button class="btn-primary-full" onclick="handleUserLogin()">ログイン</button>

        <div class="sub-links">
            <a href="#">メールを探す</a>
            <span class="sep">|</span>
            <a href="#">パスワード再設定</a>
            <span class="sep">|</span>
            <button class="link-biz" onclick="switchToBiz()">ビジネス ログイン/登録</button>
        </div>

        <!-- 소셜 로그인 -->
        <div class="divider-label"><span>かんたんログイン</span></div>
        <div class="social-btns">
            <button class="social-btn" title="Googleでログイン">
                <svg width="22" height="22" viewBox="0 0 48 48">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.7 1.22 9.2 3.22l6.85-6.85C35.9 2.38 30.27 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.2C12.43 13.72 17.74 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.2C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                </svg>
            </button>
            <button class="social-btn line-btn" title="LINEでログイン">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
                    <path d="M12 .5C5.649.5.5 4.891.5 10.25c0 4.233 2.944 7.896 7.334 9.592.32.115.757.353.869.808.1.414.064.978.032 1.407l-.14.85c-.044.258-.2 1.007.882.55 1.082-.456 5.835-3.44 7.965-5.89C18.858 15.79 20 13.124 20 10.25 20 4.891 18.351.5 12 .5z"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- [패널 2] 일반회원 회원가입 — API: POST /api/auth/signup -->
    <div id="panelRegister" class="modal-body-wrap" style="display:none;">

        <div class="fg">
            <label class="form-label-jp">
                メールアドレス <span class="required">*</span>
            </label>
            <input type="email" class="form-input" id="regEmail"
                placeholder="例: deu-shu@gmail.com"
                oninput="clearFieldError('regEmail')">
            <p class="field-msg" id="regEmailMsg"></p>
        </div>

        <div class="fg">
            <label class="form-label-jp">
                パスワード <span class="required">*</span>
            </label>
            <div class="pw-wrap">
                <input type="password" class="form-input" id="regPw"
                    placeholder="数字・英字・記号を含む8文字以上"
                    oninput="checkPwStrength(this.value)">
                <button class="pw-toggle" onclick="togglePw('regPw',this)">
                    <i class="bi bi-eye"></i>
                </button>
            </div>
            <div class="pw-strength-bar">
                <div class="pw-strength-fill" id="pwStrengthFill"></div>
            </div>
        </div>

        <div class="fg">
            <label class="form-label-jp">パスワード確認 <span class="required">*</span></label>
            <div class="pw-wrap">
                <input type="password" class="form-input" id="regPwConfirm"
                    placeholder="パスワードをもう一度入力"
                    oninput="checkPwMatch()">
                <button class="pw-toggle" onclick="togglePw('regPwConfirm',this)">
                    <i class="bi bi-eye"></i>
                </button>
            </div>
            <p class="field-msg" id="regPwConfirmMsg"></p>
        </div>

        <div class="fg">
            <label class="form-label-jp">
                お名前（姓・名） <span class="required">*</span>
            </label>
            <div class="name-grid">
                <div>
                    <input type="text" class="form-input" id="regLastName" placeholder="田中（姓）">
                    <p class="field-msg error" id="regLastNameMsg"></p>
                </div>
                <div>
                    <input type="text" class="form-input" id="regFirstName" placeholder="一郎（名）">
                </div>
            </div>
        </div>

        <div class="fg">
            <label class="form-label-jp">
                フリガナ（セイ・メイ） <span class="required">*</span>
            </label>
            <div class="name-grid">
                <div>
                    <input type="text" class="form-input" id="regLastNameKana" placeholder="タナカ（セイ）">
                    <p class="field-msg error" id="regLastNameKanaMsg"></p>
                </div>
                <div>
                    <input type="text" class="form-input" id="regFirstNameKana" placeholder="イチロウ（メイ）">
                </div>
            </div>
        </div>

        <div class="fg">
            <label class="form-label-jp">
                電話番号 <span class="required">*</span>
            </label>
            <input type="tel" class="form-input" id="regPhone"
                placeholder="例: 090-1234-5678"
                oninput="clearFieldError('regPhone')">
            <p class="field-msg error" id="regPhoneMsg"></p>
        </div>

        <button class="btn-primary-full" onclick="handleUserRegister()">会員登録</button>
    </div>

    <!-- [패널 3] 비즈니스 로그인 — API: POST /api/auth/login (role: ROLE_OWNER) -->
    <div id="panelBizLogin" class="modal-body-wrap" style="display:none;">

        <div class="info-note">
            <i class="bi bi-shop"></i>
            ビジネスアカウントでログインします。<br>
            オーナーダッシュボードへアクセスできます。
        </div>

        <div class="fg">
            <label class="form-label-jp">
                メールアドレス <span class="required">*</span>
            </label>
            <input type="email" class="form-input" id="bizLoginEmail"
                placeholder="登録済みのメールアドレス"
                oninput="clearFieldError('bizLoginEmail')">
            <p class="field-msg error" id="bizLoginEmailMsg"></p>
        </div>

        <div class="fg">
            <label class="form-label-jp">
                パスワード <span class="required">*</span>
            </label>
            <div class="pw-wrap">
                <input type="password" class="form-input" id="bizLoginPw"
                    placeholder="パスワードを入力">
                <button class="pw-toggle" onclick="togglePw('bizLoginPw',this)">
                    <i class="bi bi-eye"></i>
                </button>
            </div>
        </div>

        <button class="btn-orange-full" onclick="handleBizLogin()">ビジネスログイン</button>

        <div class="sub-links">
            <button onclick="switchToUser()">← 一般会員に戻る</button>
            <span class="sep">|</span>
            <button onclick="switchToBizReg()">新規ビジネス登録</button>
        </div>
    </div>

    <!-- [패널 4] 비즈니스 회원가입 — API: POST /api/auth/signup/owner -->
    <div id="panelBizRegister" class="modal-body-wrap" style="display:none;">

        <!-- STEP 1 -->
        <p class="form-section-title">
            <i class="bi bi-person"></i> STEP 1
        </p>

        <div class="fg">
            <label class="form-label-jp">
                メールアドレス <span class="required">*</span>
            </label>
            <input type="email" class="form-input" id="bizRegEmail"
                placeholder="例: owner@deu-shu.jp"
                oninput="clearFieldError('bizRegEmail')">
            <p class="field-msg error" id="bizRegEmailMsg"></p>
        </div>

        <div class="fg">
            <label class="form-label-jp">
                パスワード <span class="required">*</span>
            </label>
            <div class="pw-wrap">
                <input type="password" class="form-input" id="bizRegPw"
                    placeholder="数字・英字・記号を含む8文字以上"
                    oninput="checkBizPwStrength(this.value)">
                <button class="pw-toggle" onclick="togglePw('bizRegPw',this)">
                    <i class="bi bi-eye"></i>
                </button>
            </div>
            <div class="pw-strength-bar">
                <div class="pw-strength-fill" id="bizPwStrengthFill"></div>
            </div>
        </div>

        <div class="fg">
            <label class="form-label-jp">パスワード確認 <span class="required">*</span></label>
            <div class="pw-wrap">
                <input type="password" class="form-input" id="bizRegPwC"
                    placeholder="パスワードをもう一度入力"
                    oninput="checkBizPwMatch()">
                <button class="pw-toggle" onclick="togglePw('bizRegPwC',this)">
                    <i class="bi bi-eye"></i>
                </button>
            </div>
            <p class="field-msg" id="bizRegPwCMsg"></p>
        </div>

        <div class="fg">
            <label class="form-label-jp">
                代表者名（姓・名） <span class="required">*</span>
            </label>
            <div class="name-grid">
                <div>
                    <input type="text" class="form-input" id="bizRegLastName"
                        placeholder="田中（姓）" oninput="clearBizVerify()">
                </div>
                <div>
                    <input type="text" class="form-input" id="bizRegFirstName"
                        placeholder="一郎（名）" oninput="clearBizVerify()">
                </div>
            </div>
        </div>

        <div class="fg">
            <label class="form-label-jp">
                フリガナ（セイ・メイ） <span class="required">*</span>
            </label>
            <div class="name-grid">
                <div>
                    <input type="text" class="form-input" id="bizRegLastNameKana" placeholder="タナカ（セイ）">
                </div>
                <div>
                    <input type="text" class="form-input" id="bizRegFirstNameKana" placeholder="イチロウ（メイ）">
                </div>
            </div>
        </div>

        <div class="fg">
            <label class="form-label-jp">
                代表電話番号 <span class="required">*</span>
            </label>
            <input type="tel" class="form-input" id="bizRegPhone" placeholder="例: 03-1234-5678">
            <p class="hint">※ 1つの番号につき1オーナーアカウントのみ登録可能</p>
        </div>

        <!-- STEP 2 -->
        <p class="form-section-title">
            <i class="bi bi-shield-check"></i> STEP 2 — 事業者番号照合
        </p>

        <div class="fg">
            <label class="form-label-jp">
                事業者番号 <span class="required">*</span>
            </label>
            <div class="verify-row">
                <input type="text" class="form-input" id="bizRegBizNum"
                    placeholder="例: 1234567890"
                    oninput="clearBizVerify()">
                <button class="btn-verify" onclick="verifyBusinessNumber()">照合</button>
            </div>
            <div class="ok-note" id="bizVerifyOk">
                <i class="bi bi-check-circle-fill"></i>
                <span id="bizVerifyOkText"></span>
            </div>
            <p class="field-msg error" id="bizRegBizNumMsg"></p>
        </div>

        <!-- STEP 3 -->
        <p class="form-section-title">
            <i class="bi bi-shop"></i> STEP 3 — 店舗情報（照合後に自動入力）
        </p>

        <div class="fg">
            <label class="form-label-jp">
                店舗名
                <span class="auto-fill-label">✔ 自動入力・編集不可</span>
            </label>
            <input type="text" class="form-input" id="bizRegStoreName"
                placeholder="STEP 2 の照合完了後に自動入力されます"
                disabled>
        </div>

        <div class="fg">
            <label class="form-label-jp">
                店舗住所
                <span class="auto-fill-label">✔ 自動入力・編集不可</span>
            </label>
            <input type="text" class="form-input" id="bizRegStoreAddress"
                placeholder="STEP 2 の照合完了後に自動入力されます"
                disabled>
        </div>

        <div class="btn-row">
            <button class="btn-back" onclick="switchToBiz()">← 戻る</button>
            <button class="btn-orange-full" style="margin-top:0;" onclick="handleBizRegister()">
                ビジネス登録完了
            </button>
        </div>

        <div style="height:0.5rem;"></div>
    </div>

</div><!-- /auth-modal -->
</div><!-- /auth-overlay -->


<!-- 공통 JS -->
<script th:src="@{/js/script.js}"></script>

</header>
</body>
</html>
