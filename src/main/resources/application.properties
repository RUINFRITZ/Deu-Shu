spring.application.name=Deu-Shu

# ===============================================================
# [ ドゥーシュー ] 共通サーバー設定
# ===============================================================
# サーバーのポート番号（必要に応じて変更）
server.port=8888

# リクエスト/レスポンスのデフォルトエンコーディング設定
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# ===============================================================
# 1. データベース (MySQL) & MyBatis 設定
# ===============================================================

# --- JDBC 接続情報 ---
# TODO: DB名 / アカウント / パスワードの変更必須
spring.datasource.url=jdbc:mysql://localhost:3306/deushu?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=deushu
spring.datasource.password=1234

# MySQL 8.x ドライバー
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# コネクションプール (HikariCP) オプション – トラフィックに応じてチューニング可能
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# --- MyBatis 基本設定 ---
# Mapper XML ファイルの配置場所 (例: src/main/resources/mappers/)
mybatis.mapper-locations=classpath:/mappers/**/*.xml

# ドメインパッケージ (VO/Entity) のエイリアス登録
# 【修正済】 Javaの命名規則に従い全て小文字に統一し、カンマ区切りで単一キーに統合しきりました。
mybatis.type-aliases-package=com.deushu.member.domain,com.deushu.store.domain,com.deushu.order.domain,com.deushu.review.domain,com.deushu.member.dto,com.deushu.store.dto,com.deushu.order.dto,com.deushu.review.dto

# DBのカラム名 (snake_case) ↔ オブジェクトのフィールド名 (camelCase) の自動マッピングを有効化
mybatis.configuration.map-underscore-to-camel-case=true

# SQLログの出力設定（開発時のデバッグ用途）
logging.level.org.mybatis=DEBUG
logging.level.com.deushu.mapper=DEBUG
logging.level.org.springframework.jdbc.core=DEBUG

# ===============================================================
# 2. Spring MVC & JSON 設定
# ===============================================================
# 404エラー発生時、NoHandlerFoundExceptionをスローし、GlobalExceptionHandlerで横断的に捕捉させる
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# JSON直列化時のデフォルト設定 (日付をタイムスタンプ形式にしない)
spring.jackson.serialization.write-dates-as-timestamps=false

# ===============================================================
# 3. Spring Security & セッション管理設定 (ベさん領域)
#    - JWTの学習コストを鑑み、伝統的なセッション（Cookie）方式へ切り替え
# ===============================================================
# セッションクッキーの名前をプロジェクト専用に明示的に定義
server.servlet.session.cookie.name=DEUSHUSESSION

# セッションの有効期限設定 (秒単位: 3600秒 = 1時間)
server.servlet.session.timeout=3600

# フロントエンド(React/Vueなど)とバックエンドのドメインが異なる場合、
# Cookieを正常にやり取りするためのセキュリティ設定（SameSite）
# ※ 実際のSecurityConfigでのCors設定（AllowCredentials=true）と連動させること
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false 
# (ローカル開発時はfalse。HTTPS本番環境では必ずtrueに切り替える)

# ※ 注意: BCryptによるパスワード暗号化はプロパティ設定ではなく、
# Javaコード側で @Bean public PasswordEncoder passwordEncoder() { return new BCryptPasswordEncoder(); }
# として定義して使い切ります。

# ===============================================================
# 4. WebClient & PortOne 決済API設定 (パクさん領域)
# ===============================================================
# 外部決済・トランザクションAPI通信用 (WebFlux使用)
logging.level.org.springframework.web.reactive.function.client=INFO

# PortOne (旧Iamport) API 認証情報
# TODO: 管理者ダッシュボードで発行された「REST API Key」と「REST API Secret」に書き換えること
deushu.portone.api-key=YOUR_PORTONE_REST_API_KEY
deushu.portone.api-secret=YOUR_PORTONE_REST_API_SECRET

# ===============================================================
# 5. AWS S3 連携設定 (ユさん領域)
# ===============================================================
# TODO: 実際に発行されたIAMの Access Key / Secret Key / バケット名に書き換えること
cloud.aws.credentials.accessKey=YOUR_AWS_ACCESS_KEY
cloud.aws.credentials.secretKey=YOUR_AWS_SECRET_KEY
cloud.aws.region.static=ap-northeast-2
cloud.aws.stack.auto=false

# S3 バケット名およびレビュー画像保存用プレフィックス
deushu.s3.bucket-name=deushu-image-bucket
deushu.s3.review-prefix=reviews/
spring.thymeleaf.cache=false
# ===============================================================
# 6. Devtools & プロファイル
# ===============================================================
# ソースコード変更時の自動再起動(Live Reload)を有効化
spring.devtools.restart.enabled=true

# テンプレート/静的リソースのキャッシュを無効化（開発効率向上のため）
spring.web.resources.cache.period=0

# アクティブなプロファイル（dev / prod の切り分け用）
spring.profiles.active=dev

# ===============================================================
# 7. その他のログレベル設定
# ===============================================================
logging.level.root=INFO
logging.level.com.deushu=DEBUG