<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<aside class="admin-sidebar" th:fragment="sidebar">
    <div class="sidebar-profile">
        <div class="profile-icon"><i class="bi bi-shield-fill-check"></i></div>
        <div class="profile-name">管理者</div>
        <span class="profile-role">ADMIN</span>
    </div>
    <nav class="sidebar-nav">
        <div class="sidebar-section-label">メイン</div>
        <a href="/admin/dashboard" class="sidebar-nav-item" id="nav-dashboard">
            <i class="bi bi-grid-1x2"></i> ダッシュボード
        </a>

        <div class="sidebar-divider"></div>
