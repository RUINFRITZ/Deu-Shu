<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>クレーム管理 — ドゥーシュー 管理者</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link
	href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@700;900&family=JetBrains+Mono:wght@400;600&display=swap"
	rel="stylesheet">
<link
	href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css"
	rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/style.css}">
<link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
	<div th:replace="~{fragments/header :: header}"></div>
	<main>
		<div class="admin-wrap">
			<div th:replace="~{fragments/admin_sidebar :: sidebar}"></div>
			<div class="admin-content">
				<div class="admin-section" id="sec-complaints">
					<div class="section-header">
						<div>
							<div class="section-title">
								<i class="bi bi-exclamation-circle"></i> クレーム管理
							</div>
							<div class="section-subtitle">ユーザー・オーナーからのクレームを確認し、対応・返答ができます</div>
						</div>
					</div>

					<div class="filter-bar">
						<select class="filter-select" id="complaintTypeFilter"
							onchange="filterComplaints()">
							<option value="">全ての種別</option>
							<option value="USER_TO_STORE">ユーザー→店舗</option>
							<option value="USER_TO_ADMIN">ユーザー→運営</option>
							<option value="OWNER_TO_ADMIN">オーナー→運営</option>
						</select> <select class="filter-select" id="complaintStatusFilter"
							onchange="filterComplaints()">
							<option value="">全てのステータス</option>
							<option value="PENDING">未対応</option>
							<option value="IN_PROGRESS">対応中</option>
							<option value="RESOLVED">解決済</option>
						</select> <span class="filter-count" id="complaintCount"></span>
					</div>

					<div class="admin-card">
						<div class="table-scroll">
							<table>
								<thead>
									<tr>
										<th>ID</th>
										<th>種別</th>
										<th>申告者</th>
										<th>対象店舗</th>
										<th>タイトル</th>
										<th>ステータス</th>
										<th>受付日</th>
										<th>操作</th>
									</tr>
								</thead>
								<tbody id="complaintTbody"></tbody>
							</table>
						</div>
						<div class="pagination" id="complaintPagination"></div>
					</div>
				</div>
			</div>
		</div>
	</main>
	<div th:replace="~{fragments/footer :: footer}"></div>

	<!-- 클레임 대응 모달 -->
	<div class="admin-overlay" id="complaintModal">
		<div class="admin-modal">
			<div class="admin-modal-header">
				<span class="admin-modal-title"><i class="bi bi-reply"></i>
					クレーム対応</span>
				<button class="admin-modal-close"
					onclick="closeModal('complaintModal')">
					<i class="bi bi-x-lg"></i>
				</button>
			</div>
			<div class="admin-modal-body">
				<div class="modal-fg">
					<label class="modal-label">クレーム内容</label>
					<textarea class="modal-input" id="complaintContent" rows="4"
						style="resize: none; background: var(--bg-light, #f9f9f9); cursor: default;"
						readonly></textarea>
				</div>
				<div class="modal-fg">
					<label class="modal-label">ステータス変更</label> <select
						class="modal-input" id="complaintModalStatus">
						<option value="PENDING">未対応</option>
						<option value="IN_PROGRESS">対応中</option>
						<option value="RESOLVED">解決済</option>
					</select>
				</div>
				<div class="modal-fg">
					<label class="modal-label">管理者返答</label>
					<textarea class="modal-input" id="complaintReply" rows="4"
						placeholder="返答内容を入力してください..." style="resize: vertical;"></textarea>
				</div>
			</div>
			<div class="admin-modal-footer">
				<button class="btn-admin btn-admin-ghost"
					onclick="closeModal('complaintModal')">キャンセル</button>
				<button class="btn-admin btn-admin-primary"
					onclick="confirmComplaintReply()">
					<i class="bi bi-send"></i> 返答する
				</button>
			</div>
		</div>
	</div>

	<div class="toast-wrap" id="toastWrap"></div>
	<script th:src="@{/js/admin.js}"></script>
	<script>
// COMPLAINTS / filteredComplaints / currentComplaintId → admin.js で let 宣言済み → 再宣言しない
// complaintTypeBadge / complaintTypeLabel / complaintStatusBadge / complaintStatusLabel
// → admin.js で const 宣言済み → 再宣言しない

// renderComplaints を上書き（null 安全・日付フォーマット対応版）
function renderComplaints(data) {
    const t = document.getElementById('complaintTbody');
    if (!t) return;
    t.innerHTML = '';
    if (!data.length) {
        t.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--light-gray);">データがありません</td></tr>';
        return;
    }
    data.forEach(c => {
        const createdDate = c.createdAt ? String(c.createdAt).substring(0, 10) : '-';
        t.innerHTML += `<tr>
            <td class="text-mono text-sm">#${c.id}</td>
            <td><span class="badge ${complaintTypeBadge[c.complaintType] || 'badge-user'}">${complaintTypeLabel[c.complaintType] || c.complaintType}</span></td>
            <td class="text-sm">${c.reporterName || '-'}<br><span class="text-muted">${c.reporterEmail || ''}</span></td>
            <td class="text-sm text-muted">${c.targetStoreName || '-'}</td>
            <td class="fw-700 text-sm">${c.title || ''}</td>
            <td><span class="badge ${complaintStatusBadge[c.status] || 'badge-pending'}">${complaintStatusLabel[c.status] || c.status}</span></td>
            <td class="text-sm text-muted">${createdDate}</td>
            <td><button class="btn-admin btn-admin-outline" onclick="openComplaintModal(${c.id})"><i class="bi bi-reply"></i> 対応</button></td>
        </tr>`;
    });
    document.getElementById('complaintCount').textContent = `${data.length}件`;
}

function loadComplaints() {
    document.getElementById('complaintTbody').innerHTML =
        '<tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--light-gray);">読み込み中...</td></tr>';
    fetch('/api/admin/complaints?page=0&size=200')
        .then(r => r.json())
        .then(res => {
            COMPLAINTS = (res.data && res.data.data) ? res.data.data : [];
            filteredComplaints = [...COMPLAINTS];
            renderComplaints(filteredComplaints);
        })
        .catch(() => {
            document.getElementById('complaintTbody').innerHTML =
                '<tr><td colspan="8" style="text-align:center;padding:2rem;color:#dc2626;">読み込み失敗</td></tr>';
        });
}

document.addEventListener('DOMContentLoaded', function () {
    const nav = document.getElementById('nav-complaints');
    if (nav) nav.classList.add('active');
    loadComplaints();
});
</script>
</body>
</html>
