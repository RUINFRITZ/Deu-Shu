<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>店舗管理 — ドゥーシュー 管理者</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/style.css}">
<link rel="stylesheet" th:href="@{/css/admin.css}">

</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<main>
<div class="admin-wrap">
    <div th:replace="~{fragments/admin-sidebar :: sidebar('stores')}"></div>
    <div class="admin-content">
                <div class="admin-section" id="sec-stores">
            <div class="section-header">
                <div>
                    <div class="section-title"><i class="bi bi-shop"></i> 店舗管理</div>
                    <div class="section-subtitle">登録店舗の停止・復旧・カテゴリ別フィルタリングができます</div>
                </div>
            </div>


            <div class="filter-bar">
                <div class="filter-search-wrap">
                    <i class="bi bi-search"></i>
                    <input type="text" id="storeSearch" placeholder="店舗名検索..." oninput="filterStores()">
                </div>
                <select class="filter-select" id="storeCatFilter" onchange="filterStores()">
                    <option value="">全カテゴリ</option>
                    <option value="BAKERY">ベーカリー</option>
                    <option value="SUSHI">お寿司</option>
                    <option value="LUNCHBOX">お弁当</option>
                    <option value="CAFE">カフェ</option>
                    <option value="SIDEDISH">惣菜</option>
                </select>
                <select class="filter-select" id="storeStatusFilter" onchange="filterStores()">
                    <option value="">全てのステータス</option>
                    <option value="active">営業中</option>
                    <option value="deleted">閉店</option>
                </select>
                <span class="filter-count" id="storeCount"></span>
            </div>

            <div class="admin-card">
                <div class="table-scroll">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th><th>店舗名</th><th>カテゴリ</th><th>オーナー</th>
                                <th>住所</th><th>営業時間</th><th>登録日</th><th>状態</th><th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="storeTbody"></tbody>
                    </table>
                </div>
                <div class="pagination" id="storePagination"></div>
            </div>
        </div>



    </div>
</div>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>

<!-- 점포 정지 모달 -->
<div class="admin-overlay" id="stopModal">
    <div class="admin-modal">
        <div class="admin-modal-header">
            <span class="admin-modal-title"><i class="bi bi-slash-circle"></i> 店舗停止</span>
            <button class="admin-modal-close" onclick="closeModal('stopModal')"><i class="bi bi-x-lg"></i></button>
        </div>
        <div class="admin-modal-body">
            <p style="font-size:0.83rem;color:var(--mid-gray);margin-bottom:1.2rem;">
                <strong id="stopModalStoreName"></strong> を停止します。
            </p>
            <div class="modal-fg">
                <label class="modal-label">停止事由</label>
                <select class="modal-input" id="stopReasonSelect">
                    <option value="規約違反">規約違反</option>
                    <option value="長期休業">長期休業</option>
                    <option value="営業許可取消">営業許可取消</option>
                    <option value="オーナー要請">オーナー要請</option>
                    <option value="その他">その他</option>
                </select>
            </div>
            <div class="modal-fg" id="stopReasonEtcWrap" style="display:none;">
                <label class="modal-label">詳細事由</label>
                <input type="text" class="modal-input" id="stopReasonEtc" placeholder="詳細を入力してください...">
            </div>
        </div>
        <div class="admin-modal-footer">
            <button class="btn-admin btn-admin-ghost" onclick="closeModal('stopModal')">キャンセル</button>
            <button class="btn-admin btn-admin-danger" onclick="confirmStopStore()"><i class="bi bi-slash-circle"></i> 停止する</button>
        </div>
    </div>
</div>


<div class="toast-wrap" id="toastWrap"></div>
<script>

let STORES = [];
let filteredStores = [];
const catBadge = {BAKERY:'badge-bakery',SUSHI:'badge-sushi',LUNCHBOX:'badge-lunchbox',CAFE:'badge-cafe',SIDEDISH:'badge-sidedish'};
const catLabel = {BAKERY:'ベーカリー',SUSHI:'お寿司',LUNCHBOX:'お弁当',CAFE:'カフェ',SIDEDISH:'惣菜'};

function loadStores() {
    document.getElementById('storeTbody').innerHTML =
        '<tr><td colspan="9" style="text-align:center;padding:2rem;color:var(--light-gray);">読み込み中...</td></tr>';
    fetch('/api/admin/stores?page=0&size=200')
        .then(r => r.json())
        .then(res => {
            STORES = res.data || [];
            filteredStores = [...STORES];
            renderStores(filteredStores);
        })
        .catch(() => {
            document.getElementById('storeTbody').innerHTML =
                '<tr><td colspan="9" style="text-align:center;padding:2rem;color:#dc2626;">読み込み失敗</td></tr>';
        });
}
function renderStores(data) {
    const t = document.getElementById('storeTbody');
    t.innerHTML = '';
    if (!data.length) {
        t.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:2rem;color:var(--light-gray);">データがありません</td></tr>';
        return;
    }
    data.forEach(s => {
        const del = !!s.deletedAt;
        const fmtTime = v => {
            if (!v) return '-';
            if (Array.isArray(v)) return String(v[0]).padStart(2,'0')+':'+String(v[1]).padStart(2,'0');
            return String(v).substring(0,5);
        };
        const createdDate = s.createdAt ? String(s.createdAt).substring(0,10) : '-';
        t.innerHTML += `<tr style="${del?'opacity:0.5;':''}">
            <td class="text-mono text-sm">#${s.id}</td>
            <td class="fw-700">${s.name}</td>
            <td><span class="badge ${catBadge[s.category]||''}">${catLabel[s.category]||s.category}</span></td>
            <td class="text-sm">${s.ownerName||'-'}<br><span class="text-muted">${s.ownerEmail||''}</span></td>
            <td class="text-sm text-muted">${s.address||'-'}</td>
            <td class="text-sm text-mono">${fmtTime(s.openTime)}〜${fmtTime(s.closeTime)}</td>
            <td class="text-sm text-muted">${createdDate}</td>
            <td><span class="badge ${del?'badge-deleted':'badge-active'}">${del?'閉店':'営業中'}</span></td>
            <td><div class="action-btns">
                ${!del
                    ?`<button class="btn-admin btn-admin-danger" onclick="openStopModal(${s.id})"><i class="bi bi-slash-circle"></i> 停止</button>`
                    :`<button class="btn-admin btn-admin-success" onclick="restoreStore(${s.id})"><i class="bi bi-arrow-counterclockwise"></i> 復旧</button>`}
            </div></td>
        </tr>`;
    });
    document.getElementById('storeCount').textContent = `${data.length}件`;
}
function filterStores() {
    const kw = document.getElementById('storeSearch').value.toLowerCase();
    const cat = document.getElementById('storeCatFilter').value;
    const st = document.getElementById('storeStatusFilter').value;
    filteredStores = STORES.filter(s => {
        const mk = !kw || s.name.toLowerCase().includes(kw);
        const mc = !cat || s.category === cat;
        const ms = !st || (st==='active'?!s.deletedAt:!!s.deletedAt);
        return mk && mc && ms;
    });
    renderStores(filteredStores);
}

function openStopModal(id) {
    currentStopStoreId = id;
    const s = STORES.find(x=>x.id===id);
    if (!s) return;
    document.getElementById('stopModalStoreName').textContent = s.name;
    document.getElementById('stopReasonSelect').value = '規約違反';
    document.getElementById('stopReasonEtcWrap').style.display = 'none';
    document.getElementById('stopReasonEtc').value = '';
    document.getElementById('stopReasonSelect').onchange = function() {
        document.getElementById('stopReasonEtcWrap').style.display =
            this.value === 'その他' ? 'block' : 'none';
    };
    openModal('stopModal');
}
function confirmStopStore() {
    const reason = document.getElementById('stopReasonSelect').value;
    const etc = document.getElementById('stopReasonEtc').value.trim();
    const finalReason = (reason === 'その他' && etc) ? etc : reason;
    const s = STORES.find(x=>x.id===currentStopStoreId);
    if (!s) return;
    fetch(`/api/admin/stores/${currentStopStoreId}`, {
        method: 'DELETE',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ stopReason: finalReason })
    })
    .then(r => { if (!r.ok) throw new Error(); })
    .then(() => {
        s.deletedAt = new Date().toISOString().split('T')[0];
        s.stopReason = finalReason;
        renderStores(filteredStores);
        closeModal('stopModal');
        showToast(`「${s.name}」を停止しました（事由: ${finalReason}）`, 'info');
    })
    .catch(() => showToast('停止処理に失敗しました', 'error'));
}
function restoreStore(id) {
    fetch(`/api/admin/stores/${id}/restore`, { method: 'PATCH' })
        .then(r => { if (!r.ok) throw new Error(); })
        .then(() => {
            const s = STORES.find(x=>x.id===id);
            if (s) s.deletedAt = null;
            renderStores(filteredStores);
            showToast(`「${s?.name}」を復旧しました`, 'success');
        })
        .catch(() => showToast('復旧処理に失敗しました', 'error'));
}function showToast(msg, type='success') {
    const wrap = document.getElementById('toastWrap');
    const iconMap = { success:'bi-check-circle-fill', error:'bi-x-circle-fill', info:'bi-info-circle-fill' };
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.innerHTML = `
        <div class="toast-icon"><i class="bi ${iconMap[type]||iconMap.info}"></i></div>
        <span class="toast-msg">${msg}</span>
        <button class="toast-close" onclick="this.parentElement.remove()"><i class="bi bi-x"></i></button>`;
    wrap.appendChild(t);
    setTimeout(() => { t.classList.add('hide'); setTimeout(()=>t.remove(), 350); }, 3500);
}
function deactivateStore(id) { openStopModal(id); }
let currentStopStoreId = null;

document.addEventListener('DOMContentLoaded', function() {
    loadStores();
    document.getElementById('stopReasonSelect').addEventListener('change', function() {
        document.getElementById('stopReasonEtcWrap').style.display =
            this.value === 'その他' ? 'block' : 'none';
    });
});

document.querySelectorAll('.admin-overlay').forEach(el => {
    el.addEventListener('click', e => { if (e.target===el) el.classList.remove('active'); });
});

</script>
<script th:src="@{/js/admin.js}"></script>
</body>
</html>
