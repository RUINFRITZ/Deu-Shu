<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>注文完了 — ドゥーシュー</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/style.css}">
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<style>
body { background: #f7f8fa; font-family: 'Noto Sans JP', sans-serif; }
.complete-wrap { max-width: 440px; margin: 2.5rem auto; padding: 0 1rem; }
.qr-card {
    background: #fff; border-radius: 20px;
    box-shadow: 0 6px 32px rgba(0,0,0,.10);
    padding: 2.2rem 2rem 1.8rem; text-align: center;
}
.success-icon  { font-size: 3rem; color: #2d6a4f; }
.qr-title      { font-size: 1.25rem; font-weight: 700; color: #1a472a; margin: .5rem 0 .2rem; }
.qr-sub        { font-size: .83rem; color: #888; margin-bottom: 1.5rem; }
#qrCanvas      { border: 6px solid #1a472a; border-radius: 14px; display: block; margin: 0 auto; }
.pickup-label  { margin-top: 1rem; font-size: .78rem; color: #999; }
.pickup-code   {
    margin-top: .3rem; background: #f0f7f4; border-radius: 8px;
    padding: .55rem 1rem; font-family: 'Courier New', monospace;
    font-size: 1rem; font-weight: 700; letter-spacing: 2px;
    color: #1a472a; word-break: break-all;
}
.status-badge  {
    display: inline-block; background: #d1fae5; color: #065f46;
    font-size: .75rem; font-weight: 700; padding: .25rem .9rem;
    border-radius: 999px; margin-top: .8rem;
}
.order-summary { margin-top: 1.4rem; text-align: left; font-size: .85rem; }
.order-row     { display: flex; justify-content: space-between; padding: .35rem 0; border-bottom: 1px solid #f0f0f0; }
.order-row:last-child { border-bottom: none; }
.order-label   { color: #999; }
.order-val     { font-weight: 600; color: #333; }
.btn-area      { margin-top: 1.6rem; display: grid; gap: .6rem; }
</style>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="complete-wrap">
    <div id="loadingState" class="qr-card">
        <div class="spinner-border text-success" role="status"></div>
        <p class="mt-3 text-muted small">注文情報を読み込み中...</p>
    </div>

    <div id="qrCard" class="qr-card d-none">
        <div class="success-icon"><i class="bi bi-check-circle-fill"></i></div>
        <div class="qr-title">注文が確定しました！</div>
        <div class="qr-sub">お店でこのQRコードをご提示ください</div>

        <canvas id="qrCanvas"></canvas>

        <div class="pickup-label">ピックアップコード</div>
        <div class="pickup-code" id="pickupCodeText">—</div>
        <div class="status-badge" id="statusBadge">決済完了 · ピックアップ待ち</div>
        <div class="order-summary" id="orderSummary"></div>

        <div class="btn-area">
            <button class="btn btn-outline-secondary btn-sm" onclick="window.print()">
                <i class="bi bi-printer"></i> QRを印刷する
            </button>
            <a th:href="@{/}" class="btn btn-outline-success btn-sm">
                <i class="bi bi-house"></i> トップへ戻る
            </a>
        </div>
    </div>

    <div id="errorCard" class="qr-card d-none">
        <div class="text-danger fs-1"><i class="bi bi-exclamation-triangle"></i></div>
        <p class="mt-2 text-muted small" id="errorMsg">読み込みに失敗しました</p>
        <a th:href="@{/}" class="btn btn-outline-secondary btn-sm mt-2">トップへ戻る</a>
    </div>
</div>

<script th:inline="javascript">
/*<![CDATA[*/
const ORDER_ID = /*[[${orderId}]]*/ null;

async function init() {
    if (!ORDER_ID) { showError('注文IDが見つかりません'); return; }
    try {
        const res  = await fetch(`/api/v1/orders/${ORDER_ID}/qr`);
        if (!res.ok) { showError(`エラー: HTTP ${res.status}`); return; }
        const json = await res.json();
        if (!json.success) { showError(json.message || '取得失敗'); return; }

        const o = json.data;

        await QRCode.toCanvas(document.getElementById('qrCanvas'), o.pickupCode, {
            width: 230, margin: 2,
            color: { dark: '#1a472a', light: '#ffffff' }
        });

        document.getElementById('pickupCodeText').textContent = o.pickupCode;

        const statusMap = {
            PAYMENT_COMPLETED: '決済完了 · ピックアップ待ち',
            PICKUP_COMPLETED:  'ピックアップ済み',
            CANCELED:          'キャンセル済み',
        };
        const badge = document.getElementById('statusBadge');
        badge.textContent = statusMap[o.orderStatus] || o.orderStatus;
        if (o.orderStatus === 'PICKUP_COMPLETED') {
            badge.style.cssText = 'background:#e5e7eb;color:#6b7280';
        }

        document.getElementById('orderSummary').innerHTML = `
            <div class="order-row">
                <span class="order-label">注文番号</span>
                <span class="order-val">#${o.orderId}</span>
            </div>
            <div class="order-row">
                <span class="order-label">店舗名</span>
                <span class="order-val">${o.storeName || '—'}</span>
            </div>
            <div class="order-row">
                <span class="order-label">合計金額</span>
                <span class="order-val">¥${Number(o.totalPrice).toLocaleString()}</span>
            </div>
            <div class="order-row">
                <span class="order-label">注文日時</span>
                <span class="order-val">${o.createdAt || '—'}</span>
            </div>
        `;

        document.getElementById('loadingState').classList.add('d-none');
        document.getElementById('qrCard').classList.remove('d-none');
    } catch (e) {
        showError('通信エラーが発生しました');
        console.error(e);
    }
}

function showError(msg) {
    document.getElementById('loadingState').classList.add('d-none');
    document.getElementById('errorMsg').textContent = msg;
    document.getElementById('errorCard').classList.remove('d-none');
}
init();
/*]]>*/
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
