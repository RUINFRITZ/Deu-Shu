<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} ?: '가게 상세'">가게 상세</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/detail.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="main-content">
    <div class="container">

        <!-- 뒤로가기 -->
        <div class="back-nav">
            <a th:href="@{/store/list}" class="back-link">
                <i class="bi bi-arrow-left"></i>
                <span>가게 목록</span>
            </a>
        </div>

        <!-- ✅ 이미지 갤러리: JS가 채움 -->
        <section class="image-gallery">
            <div class="gallery-main">
                <img id="mainImage" src="" alt="대표 이미지">
                <button class="btn-favorite" id="favBtn">
                    <i class="bi bi-heart"></i>
                </button>
            </div>

            <div class="gallery-grid" id="subImages">
                <!-- JS로 4장 채움 -->
            </div>
        </section>

        <!-- ✅ 가게 정보: JS가 채움 -->
        <section class="store-info">
            <div class="store-header">
                <h1 id="storeName">가게명</h1>
                <span class="store-category" id="storeCategory">카테고리</span>
            </div>

            <div class="store-rating">
                <div class="rating-stars">
                    <i class="bi bi-star-fill"></i>
                    <span class="rating-score" id="ratingAvg">0.0</span>
                </div>
                <span class="review-count" id="reviewCount">리뷰 0</span>
            </div>

            <!-- (설명 컬럼이 DB에 없으면 JS에서 숨기거나 빈값 처리) -->
            <p class="store-description" id="storeDesc" style="display:none;"></p>

            <div class="store-details">
                <div class="detail-item">
                    <i class="bi bi-geo-alt"></i>
                    <div>
                        <span class="detail-label">주소</span>
                        <span class="detail-value" id="storeAddress">-</span>
                    </div>
                </div>

                <div class="detail-item">
                    <i class="bi bi-clock"></i>
                    <div>
                        <span class="detail-label">영업시간</span>
                        <span class="detail-value" id="storeHours">-</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- ✅ 지도: 일단 텍스트만 JS로 -->
        <section class="map-section">
            <h2>위치</h2>
            <div class="map-placeholder">
                <i class="bi bi-geo-alt"></i>
                <p>지도 API 영역</p>
                <span id="mapAddress">-</span>
            </div>
        </section>

        <!-- ✅ 할인 상품 목록: JS가 리스트 생성 -->
        <section class="products-section">
            <h2>할인 상품 목록</h2>
            <div class="product-grid" id="itemsGrid">
                <!-- JS로 product-card 반복 생성 -->
            </div>
        </section>

        <!-- ✅ 리뷰 섹션: 지금은 리뷰 API 붙이기 전이므로 카운트만 맞춰둠 -->
        <section class="reviews-section">
            <div class="reviews-header">
                <h2 id="reviewsTitle">리뷰 (0)</h2>
                <button class="btn-write-review" onclick="openReviewModal()">
                    <i class="bi bi-pencil"></i>
                    리뷰 작성
                </button>
            </div>

            <div class="reviews-list" id="reviewsList">
                <!-- 리뷰 API 붙이면 JS로 채우기 -->
            </div>

            <button class="btn-load-more" id="reviewsMoreBtn" style="display:none;">
                더보기 <i class="bi bi-chevron-down"></i>
            </button>
        </section>

    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script th:src="@{/js/script.js}"></script>
<script th:src="@{/js/detail.js}"></script>

<!-- ✅ storeId는 컨트롤러에서 model에 넣어둔 값 -->
<script th:inline="javascript">
    const storeId = /*[[${storeId}]]*/ 0;
</script>

</body>
</html>
