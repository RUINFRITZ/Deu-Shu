<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title th:text="${pageTitle} ?: '店舗詳細'">店舗詳細</title>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@700;900&display=swap" rel="stylesheet">

<!-- Bootstrap 5 CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

<!-- Leaflet CSS (head에 반드시 위치) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>

<!-- 프로젝트 CSS -->
<link rel="stylesheet" th:href="@{/css/style.css}">
<link rel="stylesheet" th:href="@{/css/detail.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="main-content">
    <div class="container py-4">


        <!-- ════════════════════════════════════════
             HERO: 슬라이더(좌) + 가게 정보(우)
        ════════════════════════════════════════ -->
        <div class="store-hero row g-0 mb-4">

            <!-- 왼쪽: 이미지 슬라이더 -->
            <div class="col-lg-6">
                <div class="store-slider" id="storeSlider">
                    <div class="slider-track" id="sliderTrack">
                        <!-- JS가 <img> 태그 삽입 -->
                        <div class="slider-empty">
                            <i class="bi bi-image"></i>
                        </div>
                    </div>
                    <button class="slider-btn prev" id="sliderPrev" onclick="sliderMove(-1)">
                        <i class="bi bi-chevron-left"></i>
                    </button>
                    <button class="slider-btn next" id="sliderNext" onclick="sliderMove(1)">
                        <i class="bi bi-chevron-right"></i>
                    </button>
                    <div class="slider-dots" id="sliderDots"></div>
                    <button class="btn-fav" id="favBtn">
                        <i class="bi bi-heart"></i>
                    </button>
                </div>
            </div>

            <!-- 오른쪽: 가게 정보 패널 -->
            <div class="col-lg-6">
                <div class="store-info-panel">

                    <div class="d-flex align-items-start gap-2 flex-wrap mb-2">
                        <h1 class="sip-name" id="storeName">-</h1>
                        <span class="sip-cat" id="storeCategory">-</span>
                    </div>

                    <div class="sip-rating mb-3">
                        <i class="bi bi-star-fill"></i>
                        <span id="ratingAvg">0.0</span>
                        <span class="sip-review-count" id="reviewCount">리뷰 0건</span>
                    </div>

                    <hr class="sip-divider">

                    <ul class="sip-list">
                        <li>
                            <i class="bi bi-geo-alt-fill"></i>
                            <div>
                                <span class="sip-label">住所</span>
                                <span class="sip-value" id="storeAddress">-</span>
                            </div>
                        </li>
                        <li>
                            <i class="bi bi-clock-fill"></i>
                            <div>
                                <span class="sip-label">営業時間</span>
                                <span class="sip-value" id="storeHours">-</span>
                            </div>
                        </li>
                        <li>
                            <i class="bi bi-telephone-fill"></i>
                            <div>
                                <span class="sip-label">電話番号</span>
                                <span class="sip-value" id="storePhone">070-1234-5678</span>
                            </div>
                        </li>
                    </ul>

                    <!-- 가게 안내 (stores.info 컬럼 - JS에서 채워짐) -->
                    <div class="sip-info-block mt-3">
                        <div class="sip-info-title">
                            <i class="bi bi-info-circle"></i> 店舗案内
                        </div>
                        <p class="sip-info-text" id="storeInfo">案内文は登録されていません。</p>
                    </div>

                    <!-- AI 리뷰 요약 섹션 (가게 안내 바로 아래 배치) -->
                    <div class="sip-info-block mt-3" id="aiSummaryBlock">
                        <div class="sip-info-title">
                            <i class="bi bi-stars"></i> AIレビューサマリー
                        </div>
                        <!-- 로딩 중 스피너 -->
                        <div id="aiSummaryLoading" class="ai-summary-loading">
                            <span class="spinner-border spinner-border-sm text-warning" role="status"></span>
                            <span class="ms-2">レビューを分析中...</span>
                        </div>
                        <!-- 리뷰 없음 메시지 (기본 숨김) -->
                        <p id="aiSummaryEmpty" class="sip-info-text" style="display:none;">
                            レビューはありません。
                        </p>
                        <!-- AI 요약 결과 영역 (기본 숨김) -->
                        <div id="aiSummaryResult" style="display:none;">
                            <!-- 통합 요약 문장 -->
                            <p id="aiSummarySummary" class="ai-summary-text"></p>
                            <!-- 주요 키워드 태그 -->
                            <div id="aiKeywords" class="ai-keywords mt-2"></div>
                        </div>
                    </div>


                </div>
            </div>
        </div>

        <!-- ════════════════════════════════════════
             할인 상품 목록
        ════════════════════════════════════════ -->
        <section class="section-block mb-4">
            <div class="section-hd">
                <h2 class="section-title">
                    <i class="bi bi-tag-fill"></i> 割引商品一覧
                </h2>
            </div>
            <div class="product-grid" id="itemsGrid">
                <!-- JS 렌더 -->
            </div>
        </section>

        <!-- ════════════════════════════════════════
             지도
        ════════════════════════════════════════ -->
        <section class="section-block mb-4">
            <div class="section-hd">
                <h2 class="section-title">
                    <i class="bi bi-map-fill"></i> 店舗の場所
                </h2>
            </div>
            <!-- map-section 클래스 → detail.js initMap() 이 querySelector('.map-section') 로 찾음 -->
            <div class="map-section">
                <div class="map-placeholder">
                    <i class="bi bi-geo-alt"></i>
                    <p>地図を読み込み中...</p>
                    <span id="mapAddress">-</span>
                </div>
            </div>
        </section>

        <!-- ════════════════════════════════════════
             리뷰
        ════════════════════════════════════════ -->
        <section class="section-block mb-4" id="reviewsSection">
            <div class="section-hd">
                <h2 class="section-title">
                    <i class="bi bi-chat-square-text-fill"></i>
                    <span id="reviewsTitle">レビュー (0)</span>
                </h2>
                <button class="btn-write-review" onclick="openReviewModal()">
                    <i class="bi bi-pencil"></i> レビューを書く
                </button>
            </div>
            <div class="reviews-list" id="reviewsList"></div>
            	<button class="btn-load-more" id="reviewsMoreBtn" style="display:none;" onclick="loadMoreReviews()">
    				もっと見る <i class="bi bi-chevron-down"></i>
				</button>
        </section>

    </div>
</main>

<!-- 리뷰 작성 모달 (2단계: 주문 선택 → 리뷰 작성) -->
<div id="reviewModal" class="review-modal-wrap" onclick="handleModalClick(event)">
    <div class="review-modal-box">
        <div class="modal-header">
            <h3 id="reviewModalTitle">注文を選択</h3>
            <button type="button" class="modal-close" onclick="closeReviewModal()">×</button>
        </div>

        <!-- STEP 1: 주문 목록 -->
        <div id="reviewStep1">
            <div class="modal-body">
                <p class="review-step-desc">レビューを書く注文を選択してください。</p>
                <div id="orderListBody">
                    <p style="color:var(--gray-500);">読み込み中...</p>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn" onclick="closeReviewModal()">閉じる</button>
            </div>
        </div>

        <!-- STEP 2: 리뷰 작성 폼 -->
        <div id="reviewStep2" style="display:none;">
            <div class="modal-body">
                <label>タイトル</label>
                <input id="reviewTitle" type="text" placeholder="タイトルを入力してください"/>
                <label style="margin-top:12px;">内容</label>
                <textarea id="reviewContent" rows="4" placeholder="内容を入力してください"></textarea>
                <div class="counter"><span id="currentCount">0</span>/500</div>
                <label style="margin-top:12px;">評価</label>
                <div class="stars">
                    <i class="bi bi-star star-btn"></i>
                    <i class="bi bi-star star-btn"></i>
                    <i class="bi bi-star star-btn"></i>
                    <i class="bi bi-star star-btn"></i>
                    <i class="bi bi-star star-btn"></i>
                    <span class="rating-value">5.0</span>
                </div>
                <label style="margin-top:12px;">写真（任意）</label>
                <input id="imageInput" type="file" accept="image/*"/>
                <div id="imagePreview" style="display:none;margin-top:8px;">
                    <img id="previewImage" style="width:200px; height:200px; object-fit:cover; border-radius:8px; display: block;"/>
                    <button type="button" onclick="removeImage()"
				        style="margin-top:15px;
							   padding:0.375rem 0.875rem;
				               background:none;
				               color:#ef4444;
				               border:1px solid #ef4444;
				               border-radius:6px;
				               font-size:0.8125rem;
				               font-weight:600;
				               cursor:pointer;
				               transition:all 0.15s;"
				        onmouseover="this.style.background='#ef4444'; this.style.color='#fff';"
				        onmouseout="this.style.background='none'; this.style.color='#ef4444';">
				        <i class="bi bi-trash3"></i> 削除
                    </button>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn" onclick="backToOrderList()">← 戻る</button>
                <button type="button" class="btn primary" onclick="submitReview()">登録</button>
            </div>
        </div>

    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script th:inline="javascript">
    window.storeId = /*[[${storeId}]]*/ 0;
    window._sessionMemberId = /*[[${sessionMemberId}]]*/ null;
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- 결제처리 로직 (PortOne / 구 Iamport) -->
<script src="https://cdn.iamport.kr/v1/iamport.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script th:src="@{/js/detail.js}"></script>

</body>
</html>
