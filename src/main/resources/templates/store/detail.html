<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title th:text="${pageTitle} ?: '가게 상세'">가게 상세</title>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@700;900&display=swap" rel="stylesheet">

<!-- Bootstrap 5 CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

<!-- Leaflet CSS (head에 반드시 위치) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>

<!-- 프로젝트 CSS -->
<link rel="stylesheet" th:href="@{/css/style.css}">
<link rel="stylesheet" th:href="@{/css/detail.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="main-content">
    <div class="container py-4">

        <!-- 뒤로가기 -->
        <div class="mb-3">
            <a th:href="@{/store/list}" class="back-link">
                <i class="bi bi-arrow-left"></i> 가게 목록
            </a>
        </div>

        <!-- ════════════════════════════════════════
             HERO: 슬라이더(좌) + 가게 정보(우)
        ════════════════════════════════════════ -->
        <div class="store-hero row g-0 mb-4">

            <!-- 왼쪽: 이미지 슬라이더 -->
            <div class="col-lg-6">
                <div class="store-slider" id="storeSlider">
                    <div class="slider-track" id="sliderTrack">
                        <!-- JS가 <img> 태그 삽입 -->
                        <div class="slider-empty">
                            <i class="bi bi-image"></i>
                        </div>
                    </div>
                    <button class="slider-btn prev" id="sliderPrev" onclick="sliderMove(-1)">
                        <i class="bi bi-chevron-left"></i>
                    </button>
                    <button class="slider-btn next" id="sliderNext" onclick="sliderMove(1)">
                        <i class="bi bi-chevron-right"></i>
                    </button>
                    <div class="slider-dots" id="sliderDots"></div>
                    <button class="btn-fav" id="favBtn">
                        <i class="bi bi-heart"></i>
                    </button>
                </div>
            </div>

            <!-- 오른쪽: 가게 정보 패널 -->
            <div class="col-lg-6">
                <div class="store-info-panel">

                    <div class="d-flex align-items-start gap-2 flex-wrap mb-2">
                        <h1 class="sip-name" id="storeName">-</h1>
                        <span class="sip-cat" id="storeCategory">-</span>
                    </div>

                    <div class="sip-rating mb-3">
                        <i class="bi bi-star-fill"></i>
                        <span id="ratingAvg">0.0</span>
                        <span class="sip-review-count" id="reviewCount">리뷰 0건</span>
                    </div>

                    <hr class="sip-divider">

                    <ul class="sip-list">
                        <li>
                            <i class="bi bi-geo-alt-fill"></i>
                            <div>
                                <span class="sip-label">주소</span>
                                <span class="sip-value" id="storeAddress">-</span>
                            </div>
                        </li>
                        <li>
                            <i class="bi bi-clock-fill"></i>
                            <div>
                                <span class="sip-label">영업시간</span>
                                <span class="sip-value" id="storeHours">-</span>
                            </div>
                        </li>
                        <li>
                            <i class="bi bi-telephone-fill"></i>
                            <div>
                                <span class="sip-label">전화번호</span>
                                <span class="sip-value" id="storePhone">-</span>
                            </div>
                        </li>
                    </ul>
<!-- 가게 안내 (stores.info 컬럼 추가 후 JS에서 채워짐) -->
                    <div class="sip-info-block mt-3">
                        <div class="sip-info-title">
                            <i class="bi bi-info-circle"></i> 가게 안내
                        </div>
                        <p class="sip-info-text" id="storeInfo">등록된 안내문이 없습니다.</p>
                    </div>


                </div>
            </div>
        </div>

        <!-- ════════════════════════════════════════
             할인 상품 목록
        ════════════════════════════════════════ -->
        <section class="section-block mb-4">
            <div class="section-hd">
                <h2 class="section-title">
                    <i class="bi bi-tag-fill"></i> 할인 상품 목록
                </h2>
            </div>
            <div class="product-grid" id="itemsGrid">
                <!-- JS 렌더 -->
            </div>
        </section>

        <!-- ════════════════════════════════════════
             지도
        ════════════════════════════════════════ -->
        <section class="section-block mb-4">
            <div class="section-hd">
                <h2 class="section-title">
                    <i class="bi bi-map-fill"></i> 위치
                </h2>
            </div>
            <!-- map-section 클래스 → detail.js initMap() 이 querySelector('.map-section') 로 찾음 -->
            <div class="map-section">
                <div class="map-placeholder">
                    <i class="bi bi-geo-alt"></i>
                    <p>지도를 불러오는 중...</p>
                    <span id="mapAddress">-</span>
                </div>
            </div>
        </section>

        <!-- ════════════════════════════════════════
             리뷰
        ════════════════════════════════════════ -->
        <section class="section-block mb-4" id="reviewsSection">
            <div class="section-hd">
                <h2 class="section-title">
                    <i class="bi bi-chat-square-text-fill"></i>
                    <span id="reviewsTitle">리뷰 (0)</span>
                </h2>
                <button class="btn-write-review" onclick="openReviewModal()">
                    <i class="bi bi-pencil"></i> 리뷰 작성
                </button>
            </div>
            <div class="reviews-list" id="reviewsList"></div>
            <button class="btn-load-more" id="reviewsMoreBtn" style="display:none;">
                더보기 <i class="bi bi-chevron-down"></i>
            </button>
        </section>

    </div>
</main>

<!-- 리뷰 작성 모달 (Bootstrap .modal 충돌 방지: review-modal-wrap 사용) -->
<div id="reviewModal" class="review-modal-wrap" onclick="handleModalClick(event)">
    <div class="review-modal-box">
        <div class="modal-header">
            <h3>리뷰 작성</h3>
            <button type="button" class="modal-close" onclick="closeReviewModal()">×</button>
        </div>
        <div class="modal-body">
            <label>제목</label>
            <input id="reviewTitle" type="text" placeholder="제목을 입력하세요"/>
            <label style="margin-top:12px;">내용</label>
            <textarea id="reviewContent" rows="4" placeholder="내용을 입력하세요"></textarea>
            <div class="counter"><span id="currentCount">0</span>/500</div>
            <label style="margin-top:12px;">별점</label>
            <div class="stars">
                <i class="bi bi-star star-btn"></i>
                <i class="bi bi-star star-btn"></i>
                <i class="bi bi-star star-btn"></i>
                <i class="bi bi-star star-btn"></i>
                <i class="bi bi-star star-btn"></i>
                <span class="rating-value">5.0</span>
            </div>
            <label style="margin-top:12px;">사진(선택)</label>
            <input id="imageInput" type="file" accept="image/*"/>
            <div id="imagePreview" style="display:none;margin-top:8px;">
                <img id="previewImage" style="max-width:100%;"/>
                <button type="button" onclick="removeImage()">삭제</button>
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn" onclick="closeReviewModal()">취소</button>
            <button type="button" class="btn primary" onclick="submitReview()">등록</button>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script th:inline="javascript">
    const storeId = /*[[${storeId}]]*/ 0;
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- 결제처리 로직 (PortOne / 구 Iamport) -->
<script src="https://cdn.iamport.kr/v1/iamport.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script th:src="@{/js/detail.js}"></script>

	<!-- 決済処理ロジック -->
	<script src="https://cdn.iamport.kr/v1/iamport.js"></script>

</body>
</html>
