<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title th:text="${pageTitle} ?: '가게 상세'">가게 상세</title>

<!-- ✅ 1. Leaflet CSS 반드시 head에 (없으면 지도 타일 조각 깨짐) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>

<!-- 2. 프로젝트 CSS -->
<link rel="stylesheet" th:href="@{/css/style.css}">
<link rel="stylesheet" th:href="@{/css/detail.css}">

<!-- 3. Bootstrap Icons -->
<link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>

    <div th:replace="~{fragments/header :: header}"></div>

    <main class="main-content">
        <div class="container">

            <!-- 뒤로가기 -->
            <div class="back-nav">
                <a th:href="@{/store/list}" class="back-link">
                    <i class="bi bi-arrow-left"></i> <span>가게 목록</span>
                </a>
            </div>

            <!-- 이미지 갤러리 -->
            <section class="image-gallery">
                <div class="gallery-main">
                    <img id="mainImage" src="" alt="대표 이미지">
                    <button class="btn-favorite" id="favBtn">
                        <i class="bi bi-heart"></i>
                    </button>
                </div>
                <div class="gallery-grid" id="subImages"></div>
            </section>

            <!-- 가게 정보 -->
            <section class="store-info">
                <div class="store-header">
                    <h1 id="storeName">가게명</h1>
                    <span class="store-category" id="storeCategory">카테고리</span>
                </div>
                <div class="store-rating">
                    <div class="rating-stars">
                        <i class="bi bi-star-fill"></i>
                        <span class="rating-score" id="ratingAvg">0.0</span>
                    </div>
                    <span class="review-count" id="reviewCount">리뷰 0</span>
                </div>
                <p class="store-description" id="storeDesc" style="display: none;"></p>
                <div class="store-details">
                    <div class="detail-item">
                        <i class="bi bi-geo-alt"></i>
                        <div>
                            <span class="detail-label">주소</span>
                            <span class="detail-value" id="storeAddress">-</span>
                        </div>
                    </div>
                    <div class="detail-item">
                        <i class="bi bi-clock"></i>
                        <div>
                            <span class="detail-label">영업시간</span>
                            <span class="detail-value" id="storeHours">-</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 지도 -->
            <section class="map-section">
                <h2>위치</h2>
                <div class="map-placeholder">
                    <i class="bi bi-geo-alt"></i>
                    <p>지도 API 영역</p>
                    <span id="mapAddress">-</span>
                </div>
            </section>

            <!-- 할인 상품 목록 -->
            <section class="products-section">
                <h2>할인 상품 목록</h2>
                <div class="product-grid" id="itemsGrid"></div>
            </section>

            <!-- 리뷰 섹션 -->
            <section class="reviews-section">
                <div class="reviews-header">
                    <h2 id="reviewsTitle">리뷰 (0)</h2>
                    <button class="btn-write-review" onclick="openReviewModal()">
                        <i class="bi bi-pencil"></i> 리뷰 작성
                    </button>
                </div>
                <div class="reviews-list" id="reviewsList"></div>
                <button class="btn-load-more" id="reviewsMoreBtn" style="display: none;">
                    더보기 <i class="bi bi-chevron-down"></i>
                </button>
            </section>

        </div>
    </main>

    <!-- 리뷰 작성 모달 -->
    <div id="reviewModal" class="modal review-modal" onclick="handleModalClick(event)">
        <div class="modal-content">
            <div class="modal-header">
                <h3>리뷰 작성</h3>
                <button type="button" class="modal-close" onclick="closeReviewModal()">×</button>
            </div>
            <div class="modal-body">
                <label>제목</label>
                <input id="reviewTitle" type="text" placeholder="제목을 입력하세요" />
                <label style="margin-top: 12px;">내용</label>
                <textarea id="reviewContent" rows="4" placeholder="내용을 입력하세요"></textarea>
                <div class="counter"><span id="currentCount">0</span>/500</div>
                <label style="margin-top: 12px;">별점</label>
                <div class="stars">
                    <i class="bi bi-star star-btn"></i>
                    <i class="bi bi-star star-btn"></i>
                    <i class="bi bi-star star-btn"></i>
                    <i class="bi bi-star star-btn"></i>
                    <i class="bi bi-star star-btn"></i>
                    <span class="rating-value">5.0</span>
                </div>
                <label style="margin-top: 12px;">사진(선택)</label>
                <input id="imageInput" type="file" accept="image/*" />
                <div id="imagePreview" style="display: none; margin-top: 8px;">
                    <img id="previewImage" style="max-width: 100%;" />
                    <button type="button" onclick="removeImage()">삭제</button>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn" onclick="closeReviewModal()">취소</button>
                <button type="button" class="btn primary" onclick="submitReview()">등록</button>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <!-- ✅ storeId 주입 -->
    <script th:inline="javascript">
        const storeId = /*[[${storeId}]]*/ 0;
    </script>

    <!-- ✅ 스크립트 순서: Leaflet JS → detail.js (중복 제거) -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script th:src="@{/js/detail.js}"></script>

</body>
</html>
