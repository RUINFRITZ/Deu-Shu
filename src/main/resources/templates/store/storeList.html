<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Deu-Shu | 今日の閉店割引</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous"/>
    <!-- Leaflet CSS -->
	<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      crossorigin=""/>
      
    <!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link
	href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@700;900&family=JetBrains+Mono:wght@400;600&display=swap"
	rel="stylesheet">

<!-- Bootstrap Icons -->
<link
	href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css"
	rel="stylesheet"> 

    <link rel="stylesheet" th:href="@{/css/style.css}">

    <style>
        :root {
            --primary-sage:      #6FAF8F;
            --primary-sage-deep: #4F7F68;
            --bg-main:           #FAFAF8;
            --bg-soft:           #F1F1EF;
            --text-main:         #2F2F2F;
            --text-sub:          #6B6B6B;
            --border-soft:       #E0E0E0;
            --warning:           #FF9800;
            --error:             #D32F2F;
        }
        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        main { margin-top: 30px; }

        /* ── Hero ── */
        .hero-section { background-color: var(--bg-soft); }
        .hero-sub     { color: var(--text-sub); font-size: 0.9rem; }

        /* ══════════════════════════════════════
           FR-M04 필터 바
        ══════════════════════════════════════ */
        .filter-bar {
            background: #fff;
            border: 1px solid var(--border-soft);
            border-radius: 1rem;
            padding: 0.75rem 1rem;
        }
        /* 카테고리 아이콘 버튼 */
        .cat-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            background: var(--bg-soft);
            border: 2px solid transparent;
            border-radius: 0.75rem;
            padding: 0.4rem 0.7rem;
            font-size: 0.72rem;
            color: var(--text-sub);
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .cat-btn .cat-icon { font-size: 1.3rem; line-height: 1; }
        .cat-btn:hover,
        .cat-btn.active {
            border-color: var(--primary-sage-deep);
            background: #e8f4ef;
            color: var(--primary-sage-deep);
            font-weight: 600;
        }
        /* 정렬 버튼 */
        .sort-btn {
            background: var(--bg-soft);
            border: 2px solid transparent;
            border-radius: 999px;
            padding: 0.25rem 0.75rem;
            font-size: 0.78rem;
            color: var(--text-sub);
            cursor: pointer;
            transition: all 0.15s;
        }
        .sort-btn.active,
        .sort-btn:hover {
            border-color: var(--primary-sage-deep);
            background: #e8f4ef;
            color: var(--primary-sage-deep);
            font-weight: 600;
        }
        /* 필터 옵션 패널 (접기/펼치기) */
        #filter-detail {
            border-top: 1px solid var(--border-soft);
            margin-top: 0.6rem;
            padding-top: 0.6rem;
        }
        .filter-label { font-size: 0.78rem; color: var(--text-sub); margin-bottom: 4px; }

        /* ══════════════════════════════════════
           지도 패널
        ══════════════════════════════════════ */
        .panel        { background-color: #fff; border-radius: 1rem; border: 1px solid var(--border-soft); }
        .panel-header { border-bottom: 1px solid var(--border-soft); }
        #map {
            width: 100%; height: 480px;
            border-radius: 0 0 1rem 1rem;
            z-index: 0;
        }
        /* 지도 팝업 */
        .leaflet-popup-content-wrapper {
            border-radius: 0.75rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
        }
        .map-popup-title { font-weight: 700; font-size: 0.9rem; color: var(--text-main); }
        .map-popup-sub   { font-size: 0.78rem; color: var(--text-sub); margin-top: 2px; }
        .map-popup-price { font-size: 0.85rem; font-weight: 600; color: var(--primary-sage-deep); margin-top: 4px; }
        /* 지도 팝업 */
        .leaflet-popup-content-wrapper {
            border-radius: 0.75rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
        }
        .map-popup-title { font-weight: 700; font-size: 0.9rem; color: var(--text-main); }
        .map-popup-sub   { font-size: 0.78rem; color: var(--text-sub); margin-top: 2px; }
        .map-popup-price { font-size: 0.85rem; font-weight: 600; color: var(--primary-sage-deep); margin-top: 4px; }

        /* 팝업 즐겨찾기 버튼 */
        .map-popup-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
        }
        .fav-btn {
            border: none;
            background: transparent;
            padding: 0;
            cursor: pointer;
            font-size: 1.1rem;
            line-height: 1;
        }
        .fav-btn .fav-icon {
            display: inline-block;
            transition: transform 0.15s ease;
        }
        .fav-btn.is-fav .fav-icon {
            color: #E53935; /* 채워진 하트 색상 */
        }
        .fav-btn:hover .fav-icon {
            transform: scale(1.1);
        }


        /* ══════════════════════════════════════
           가게 카드 / 리스트
        ══════════════════════════════════════ */
        #store-list-container {
            overflow-y: auto;
            max-height: 480px;
            min-height: 120px;   /* ← 추가: 빈 상태에서도 컨테이너 높이 확보 */
            scroll-behavior: smooth;
        }
        #store-list-container::-webkit-scrollbar { width: 4px; }
        #store-list-container::-webkit-scrollbar-track { background: transparent; }
        #store-list-container::-webkit-scrollbar-thumb { background: var(--border-soft); border-radius: 4px; }

        .store-card {
            background-color: var(--bg-soft);
            border-radius: 0.75rem;
            border: none;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .store-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }
        .store-thumb {
            width: 64px; height: 64px;
            border-radius: 0.75rem;
            background-color: #D3D3D3;
            object-fit: cover;
            flex-shrink: 0;
        }
        .price-discount { color: var(--primary-sage-deep); font-weight: 600; }
        .price-original { color: #9E9E9E; text-decoration: line-through; font-size: 0.8rem; }
        .badge-warning-custom { background-color: var(--warning); }
        .badge-error-custom   { background-color: var(--error); }

        /* 로딩 스피너 */
        #scroll-loader {
		    display: none;
		    padding: 1rem 0;
		}
        .spinner-sage {
            width: 24px; height: 24px;
            border: 3px solid var(--border-soft);
            border-top-color: var(--primary-sage);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #list-end-msg { display: none; font-size: 0.8rem; color: var(--text-sub); padding: 1rem 0; }

        /* ── 공통 버튼 ── */
        .btn-primary-sage {
            background-color: var(--primary-sage-deep);
            border-color: var(--primary-sage-deep);
            color: #fff;
        }
        .btn-primary-sage:hover {
            background-color: var(--primary-sage);
            border-color: var(--primary-sage);
            color: #fff;
        }
        .filter-pill {
            background-color: var(--primary-sage);
            color: #fff;
            font-size: 0.75rem;
            border-radius: 999px;
            padding: 0.2rem 0.75rem;
        }
    </style>
</head>

<main>

    <!-- ══════════════════════════════════════════════════════════════

    <!-- ══════════════════════════════════════════════════════════════
         FR-M04  필터 바 (지도+리스트 섹션 위에 배치)
    ══════════════════════════════════════════════════════════════ -->
   <section class="pt-3 pb-1">
    <div class="container">
        <div class="filter-bar">

            <!-- 1행: 카테고리 아이콘 버튼 + 정렬 + 필터 더보기 -->
            <div class="d-flex flex-wrap align-items-center gap-2">

                <!-- 카테고리 버튼 -->
                <button class="cat-btn active" data-category="" onclick="selectCategory(this)">
                    <span class="cat-icon">🏪</span>すべて
                </button>
                <button class="cat-btn" data-category="BAKERY" onclick="selectCategory(this)">
                    <span class="cat-icon">🥐</span>ベーカリー
                </button>
                <button class="cat-btn" data-category="LUNCHBOX" onclick="selectCategory(this)">
                    <span class="cat-icon">🍱</span>弁当
                </button>
                <button class="cat-btn" data-category="CAFE" onclick="selectCategory(this)">
                    <span class="cat-icon">☕</span>カフェ
                </button>
                <button class="cat-btn" data-category="SUSHI" onclick="selectCategory(this)">
                    <span class="cat-icon">🍣</span>寿司
                </button>
                <button class="cat-btn" data-category="SIDEDISH" onclick="selectCategory(this)">
                    <span class="cat-icon">🥗</span>おかず
                </button>

                <!-- 구분선 -->
                <div class="vr mx-1 d-none d-sm-block" style="height:55px;"></div>

                <!-- 정렬 버튼 -->
                <button class="sort-btn active" data-sort="stock" onclick="selectSort(this)">🔥 まもなく終了</button>
                <button class="sort-btn" data-sort="discountRate" onclick="selectSort(this)">💸 割引率↑</button>
                <button class="sort-btn" data-sort="distance" onclick="selectSort(this)">📍 距離順</button>

                <!-- 구분선 -->
                <div class="vr mx-1 d-none d-sm-block" style="height:55px;"></div>

                <!-- 상세 필터 토글 버튼 -->
                <button class="sort-btn ms-auto" type="button"
                        data-bs-toggle="collapse" data-bs-target="#filter-detail"
                        aria-expanded="false" aria-controls="filter-detail">
                    ⚙ 詳細フィルター
                </button>
            </div>

            <!-- 2행: 상세 필터 (접기/펼치기) -->
            <div class="collapse" id="filter-detail">
                <div class="row g-3 mt-1">

                    <!-- 최대 가격 -->
                    <div class="col-6 col-md-3">
                        <div class="filter-label">最大割引価格 (¥)</div>
                        <input type="number" id="f-max-price" class="form-control form-control-sm"
                               placeholder="例: 800"
                               min="0" step="100"
                               oninput="scheduleFilterApply()"/>
                    </div>

                    <!-- 최소 할인율 -->
                    <div class="col-6 col-md-3">
                        <div class="filter-label">最低割引率 (%)</div>
                        <input type="range" id="f-min-rate" class="form-range" min="0" max="70" step="10" value="0"
                               oninput="document.getElementById('f-min-rate-val').textContent=this.value+'%'; scheduleFilterApply()"/>
                        <div class="text-center small text-muted">
                            <span id="f-min-rate-val">0%</span>以上
                        </div>
                    </div>

                    <!-- 마감 시간 이내 -->
                    <div class="col-6 col-md-3">
                        <div class="filter-label">閉店時間まで残り</div>
                        <select id="f-expire" class="form-select form-select-sm"
                                onchange="scheduleFilterApply()">
                            <option value="">すべて</option>
                            <option value="60">1時間以内</option>
                            <option value="120">2時間以内</option>
                            <option value="180">3時間以内</option>
                        </select>
                    </div>

                    <!-- 조회 반경 -->
                    <div class="col-6 col-md-3">
                        <div class="filter-label">検索半径 (km)</div>
                        <select id="f-radius" class="form-select form-select-sm"
                                onchange="scheduleFilterApply()">
                            <option value="">すべて</option>
                            <option value="1">1km</option>
                            <option value="2">2km</option>
                            <option value="5">5km</option>
                            <option value="10">10km</option>
                        </select>
                    </div>

                    <!-- 필터 초기화 버튼 -->
                    <div class="col-12 d-flex justify-content-end">
                        <button class="btn btn-sm btn-outline-secondary rounded-pill px-3"
                                onclick="resetFilters()">
                            ↺ フィルターをリセット
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>
</section>

<!-- ══════════════════════════════════════════════════════════════
     지도 + 리스트 영역
══════════════════════════════════════════════════════════════ -->
<section class="py-3 py-md-4">
    <div class="container">
        <div class="row g-3 g-lg-4">

            <!-- ── 좌측: 지도 패널 ── -->
            <div class="col-lg-7">
                <div class="panel h-100 d-flex flex-column">
                    <div class="panel-header px-3 px-md-4 py-2 d-flex justify-content-between align-items-center">

                            </span>

                    <!-- Leaflet 지도 -->
                    <div id="map"></div>
                </div>
            </div>

            <!-- ── 우측: 가게 리스트 패널 (무한스크롤) ── -->
            <div class="col-lg-5">
                <div class="panel h-100 d-flex flex-column">
                    <div class="panel-header px-3 px-md-4 py-2 d-flex justify-content-between align-items-center">
                        <span class="small text-muted">本日ピックアップ可能な店舗</span>
                        <span class="small text-muted" id="list-sort-label">在庫・締切間近順</span>

                    <div class="p-2 p-md-3 flex-grow-1 d-flex flex-column">

                            <!-- 무한스크롤 센티넬 -->

                            <div id="scroll-loader" class="justify-content-center">
                                <div class="spinner-sage"></div>
                            </div>
                            <div id="list-end-msg" class="text-center">

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        crossorigin=""></script>


<script th:inline="javascript">
/*<![CDATA[*/

/* =========================================================
   기본 값
========================================================= */
const REGION_LAT  = /*[[${centerLat}]]*/ 35.681236;
const REGION_LNG  = /*[[${centerLng}]]*/ 139.767125;
const REGION_NAME = /*[[${regionName}]]*/ '東京';
const INIT_RADIUS = /*[[${radius}]]*/ null;
const serverPins  = /*[[${storePins}]]*/ [];

/* =========================================================
   지도 초기화
========================================================= */
const DEFAULT_ZOOM = 15;

const map = L.map('map', {
    zoomControl: true,
    scrollWheelZoom: true
}).setView([REGION_LAT, REGION_LNG], DEFAULT_ZOOM);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

/* =========================================================
   DOM 캐시
========================================================= */
const listContainer = document.getElementById('store-list-container');
const sentinel      = document.getElementById('scroll-sentinel');
const loader        = document.getElementById('scroll-loader');
const endMsg        = document.getElementById('list-end-msg');

/* =========================================================
   상태값
========================================================= */
const PAGE_SIZE = 10;

let currentPage   = 0;
let isFetching    = false;
let isListEnd     = false;
let listCenterLat = REGION_LAT;
let listCenterLng = REGION_LNG;
let listRadius    = INIT_RADIUS;

let moveTimer = null;
let isProgrammaticMove = false;

const filterState = {
    category: '',
    sortBy: 'stock',
    maxDiscountPrice: null,
    minDiscountRate: 0,
    expireWithinMinutes: null,
    radius: INIT_RADIUS,
    centerLat: REGION_LAT,
    centerLng: REGION_LNG
};

/* =========================================================
   핀 렌더링
========================================================= */
const markerMap = {};

function createMarkerIcon(totalStock) {
    const color = totalStock <= 0  ? '#D32F2F'
                : totalStock <= 5  ? '#FF9800'
                :                    '#4F7F68';

    return L.divIcon({
        className: '',
        html: `<div style="
            width:32px; height:32px;
            border-radius:50% 50% 50% 0;
            background:${color};
            border:2px solid #fff;
            transform:rotate(-45deg);
            box-shadow:0 2px 8px rgba(0,0,0,0.25);
        "></div>`,
        iconSize:     [32, 32],
        iconAnchor:   [16, 32],
        popupAnchor:  [0, -36]
    });
}

function buildPopup(pin) {
    const stockBadge = pin.totalStock <= 0
        ? `<span style="color:#D32F2F;font-weight:700;">売り切れ</span>`
        : pin.totalStock <= 5
            ? `<span style="color:#FF9800;font-weight:700;">在庫 ${pin.totalStock}個</span>`
            : `<span style="color:#4F7F68;font-weight:700;">在庫余裕 ${pin.totalStock}+</span>`;

    return `
        <div style="min-width:180px;">
          <div class="map-popup-header">
            <div>
              <div class="map-popup-title">${pin.name}</div>
              <div class="map-popup-sub">${pin.category} · 本日 ${pin.closeTime} 閉店</div>
            </div>
            <button type="button"
                    class="fav-btn"
                    data-store-id="${pin.id}"
                    data-favorited="false"
                    onclick="toggleFavoriteFromPopup(this)">
              <span class="fav-icon">♡</span>
            </button>
          </div>
          <div class="map-popup-price">
            ¥${Number(pin.minDiscountPrice).toLocaleString()} &nbsp;${stockBadge}
          </div>
          <a href="/store/${pin.id}"
             style="display:block;margin-top:8px;text-align:center;
                    background:#4F7F68;color:#fff;border-radius:6px;
                    padding:4px 0;font-size:0.8rem;text-decoration:none;">
             詳細を見る
          </a>
        </div>`;
}

function renderPins(pins) {
    pins.forEach(pin => {
        if (markerMap[pin.id]) return;

        const marker = L.marker([pin.lat, pin.lng], {
            icon: createMarkerIcon(pin.totalStock)
        })
        .bindPopup(buildPopup(pin), { maxWidth: 220 })
        .addTo(map);

        markerMap[pin.id] = marker;
    });
}

function replacePins(pins) {
    Object.values(markerMap).forEach(marker => map.removeLayer(marker));
    Object.keys(markerMap).forEach(key => delete markerMap[key]);
    renderPins(pins);
}

/* =========================================================
   카드 렌더링
========================================================= */
function buildCardHtml(store) {
    const imgSrc = store.thumbnailUrl && String(store.thumbnailUrl).trim() !== ''
        ? store.thumbnailUrl
        : '/img/default-store.png';

    const stockBadge = store.totalStock <= 0
        ? `<span class="badge badge-error-custom text-white small">売り切れ</span>`
        : store.totalStock <= 5
            ? `<span class="badge badge-warning-custom text-white small">まもなく終了 · 在庫 ${store.totalStock}</span>`
            : `<span class="badge bg-success text-white small">在庫余裕 · ${store.totalStock}</span>`;

    const discountPrice  = store.minDiscountPrice  != null
        ? `¥${Number(store.minDiscountPrice).toLocaleString()}` : '—';
    const originalPrice  = store.minOriginalPrice  != null
        ? `¥${Number(store.minOriginalPrice).toLocaleString()}`  : '';

    return `
        <div class="card store-card mb-2"
             data-store-id="${store.id}"
             data-lat="${store.lat}"
             data-lng="${store.lng}"
             onclick="focusMapPin(this)">
            <div class="card-body d-flex">
                <img src="${imgSrc}"
                     class="store-thumb me-3"
                     alt="${store.name}"
                     onerror="this.style.background='#D3D3D3'">
                <div class="flex-grow-1">
                    <div class="d-flex justify-content-between align-items-start mb-1">
                        <h6 class="mb-0">${store.name}</h6>
                        ${stockBadge}
                    </div>
                    <div class="text-muted small mb-1">
                        ${store.category || ''} · 本日 ${store.closeTime || ''} 閉店
                    </div>
                    <div class="d-flex align-items-center gap-2">
                        <span class="price-discount">${discountPrice}</span>
                        ${originalPrice ? `<span class="price-original">${originalPrice}</span>` : ''}
                    </div>
                </div>
            </div>
        </div>`;
}

function focusMapPin(cardEl) {
    const id  = parseInt(cardEl.dataset.storeId, 10);
    const lat = parseFloat(cardEl.dataset.lat);
    const lng = parseFloat(cardEl.dataset.lng);

    if (!Number.isNaN(lat) && !Number.isNaN(lng)) {
        isProgrammaticMove = true;
        map.flyTo([lat, lng], 16, { animate: true, duration: 0.8 });
    }

    if (markerMap[id]) {
        markerMap[id].openPopup();
    }
}

/* =========================================================
   거리 계산
========================================================= */
function calcRadiusFromBounds(center, ne) {
    const R    = 6371;
    const dLat = (ne.lat - center.lat) * Math.PI / 180;
    const dLng = (ne.lng - center.lng) * Math.PI / 180;

    const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(center.lat * Math.PI / 180) *
        Math.cos(ne.lat * Math.PI / 180) *
        Math.sin(dLng / 2) * Math.sin(dLng / 2);

    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

/* =========================================================
   필터 UI 이벤트 핸들러 (HTML onclick 호출용)
========================================================= */
function selectCategory(btn) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterState.category = btn.dataset.category || '';
    applyFilter();
}

function selectSort(btn) {
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterState.sortBy = btn.dataset.sort || 'stock';
    applyFilter();
}

function resetFilters() {
    const priceEl  = document.getElementById('f-max-price');
    const rateEl   = document.getElementById('f-min-rate');
    const rateVal  = document.getElementById('f-min-rate-val');
    const expireEl = document.getElementById('f-expire');
    const radiusEl = document.getElementById('f-radius');

    if (priceEl)  priceEl.value  = '';
    if (rateEl)   rateEl.value   = '0';
    if (rateVal)  rateVal.textContent = '0%';
    if (expireEl) expireEl.value = '';
    if (radiusEl) radiusEl.value = '';

    filterState.category            = '';
    filterState.maxDiscountPrice    = null;
    filterState.minDiscountRate     = 0;
    filterState.expireWithinMinutes = null;
    filterState.radius              = INIT_RADIUS;

    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    const allBtn = document.querySelector('.cat-btn[data-category=""]');
    if (allBtn) allBtn.classList.add('active');

    applyFilter();
}

let filterTimer = null;
function scheduleFilterApply() {
    clearTimeout(filterTimer);
    filterTimer = setTimeout(applyFilter, 400);
}

/* =========================================================
   필터 파라미터 통일
========================================================= */
function syncFilterUiToState() {
    // category, sortBy는 selectCategory()/selectSort() 버튼 onclick에서 직접 세팅
    const priceEl  = document.getElementById('f-max-price');
    const rateEl   = document.getElementById('f-min-rate');
    const expireEl = document.getElementById('f-expire');
    const radiusEl = document.getElementById('f-radius');

    filterState.maxDiscountPrice    = priceEl  && priceEl.value  ? priceEl.value  : null;
    filterState.minDiscountRate     = rateEl   && rateEl.value   ? parseInt(rateEl.value, 10) : 0;
    filterState.expireWithinMinutes = expireEl && expireEl.value ? expireEl.value : null;

    if (radiusEl && radiusEl.value) {
        filterState.radius = parseFloat(radiusEl.value);
    }
}

function buildBboxFilterParams() {
    syncFilterUiToState();

    const bounds = map.getBounds();
    const sw     = bounds.getSouthWest();
    const ne     = bounds.getNorthEast();
    const center = map.getCenter();

    filterState.centerLat = center.lat;
    filterState.centerLng = center.lng;

    if (!filterState.radius || Number.isNaN(filterState.radius)) {
        if (INIT_RADIUS) {
            filterState.radius = INIT_RADIUS;
        } else {
            filterState.radius = calcRadiusFromBounds(center, ne);
        }
    }

    const params = new URLSearchParams();
    params.set('minLat', sw.lat);
    params.set('maxLat', ne.lat);
    params.set('minLng', sw.lng);
    params.set('maxLng', ne.lng);

    params.set('centerLat', filterState.centerLat);
    params.set('centerLng', filterState.centerLng);

    if (filterState.radius != null)              params.set('radius', filterState.radius);
    if (filterState.category)                    params.set('category', filterState.category);
    if (filterState.sortBy)                      params.set('sortBy', filterState.sortBy);
    if (filterState.maxDiscountPrice != null)    params.set('maxDiscountPrice', filterState.maxDiscountPrice);
    if (filterState.minDiscountRate > 0)         params.set('minDiscountRate', filterState.minDiscountRate);
    if (filterState.expireWithinMinutes != null) params.set('expireWithinMinutes', filterState.expireWithinMinutes);

    return params;
}

function buildListParams() {
    const params = new URLSearchParams();
    params.set('page', currentPage);
    params.set('size', PAGE_SIZE);

    if (listCenterLat != null) params.set('centerLat', listCenterLat);
    if (listCenterLng != null) params.set('centerLng', listCenterLng);
    if (listRadius != null)    params.set('radius', listRadius);

    if (filterState.category)                    params.set('category', filterState.category);
    if (filterState.sortBy)                      params.set('sortBy', filterState.sortBy);
    if (filterState.maxDiscountPrice != null)    params.set('maxDiscountPrice', filterState.maxDiscountPrice);
    if (filterState.minDiscountRate > 0)         params.set('minDiscountRate', filterState.minDiscountRate);
    if (filterState.expireWithinMinutes != null) params.set('expireWithinMinutes', filterState.expireWithinMinutes);

    return params;
}

/* =========================================================
   리스트 초기화 / 로딩
========================================================= */
function clearListCards() {
    let child = listContainer.firstChild;
    while (child && child !== sentinel) {
        const next = child.nextSibling;
        listContainer.removeChild(child);
        child = next;
    }
}

function resetListForNewRegion(lat, lng, radius) {
    listCenterLat = lat;
    listCenterLng = lng;
    listRadius    = radius;

    clearListCards();

    currentPage = 0;
    isListEnd   = false;
    isFetching  = false;

    loader.style.display = 'none';
    endMsg.style.display = 'none';
    endMsg.textContent   = '周辺のすべての店舗を読み込みました';

    observer.unobserve(sentinel);
    observer.observe(sentinel);

    loadNextPage();
}

async function loadNextPage() {
    if (isFetching || isListEnd) return;

    isFetching = true;
    loader.style.display = 'flex';

    try {
        const params = buildListParams();
        const resp = await fetch(`/api/stores?${params.toString()}`);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

        const data = await resp.json();
        const content = Array.isArray(data.content) ? data.content : [];

        if (content.length === 0) {
            isListEnd = true;
            loader.style.display = 'none';

            const hasAnyCard = document.querySelectorAll('#store-list-container .store-card').length > 0;
            if (!hasAnyCard) {
                endMsg.textContent = '現在ご利用可能な店舗がありません';
            }
            endMsg.style.display = 'block';
            observer.unobserve(sentinel);
            return;
        }

        content.forEach(store => {
            sentinel.insertAdjacentHTML('beforebegin', buildCardHtml(store));
        });

        currentPage++;

        if (data.last === true || content.length < PAGE_SIZE) {
            isListEnd = true;
            loader.style.display = 'none';
            endMsg.style.display = 'block';
            observer.unobserve(sentinel);
        }
    } catch (err) {
        console.error('[InfiniteScroll] 오류:', err);
        isListEnd = true;
        observer.unobserve(sentinel);

        const hasAnyCard = document.querySelectorAll('#store-list-container .store-card').length > 0;
        if (!hasAnyCard) {
            endMsg.textContent = '現在ご利用可能な店舗がありません';
        }
        endMsg.style.display = 'block';
    } finally {
        isFetching = false;
        if (!isListEnd) {
            loader.style.display = 'none';
        }
    }
}

/* =========================================================
   핀 / 리스트 동기화
========================================================= */
async function reloadPinsAndList() {
    try {
        const params = buildBboxFilterParams();

        const resp = await fetch(`/api/stores/pins/bbox?${params.toString()}`);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

        const pins = await resp.json();
        replacePins(pins);

        resetListForNewRegion(filterState.centerLat, filterState.centerLng, filterState.radius);
    } catch (err) {
        console.error('BBox reload error:', err);
    }
}

async function applyFilter() {
    await reloadPinsAndList();
}

/* =========================================================
   초기 핀 — /api/stores/pins (Caffeine 캐시 적용)으로 로딩
   - 지도 이동(moveend) / 필터 변경은 /pins/bbox (캐시 없음)로 실시간 갱신
   - initialPinsLoaded 플래그로 whenReady 중복 호출 방지
     (GPS setView 시 whenReady 재발동으로 2회 호출되는 문제 해결)
========================================================= */
let initialPinsLoaded = false; // whenReady 중복 방지 플래그

map.whenReady(function () {
    if (initialPinsLoaded) return; // 이미 로드됐으면 건너뜀
    initialPinsLoaded = true;

    let url = `/api/stores/pins?centerLat=${REGION_LAT}&centerLng=${REGION_LNG}`;
    if (INIT_RADIUS) url += `&radius=${INIT_RADIUS}`;

    fetch(url)
    .then(r => {
        // 서버 X-Cache 헤더로 HIT/MISS 판별
        const cacheStatus = r.headers.get('X-Cache');
        if (cacheStatus === 'HIT') {
            console.log('%c[Cache] HIT ✅ 서버 캐시 사용 (DB 조회 없음)', 'color:#22c55e; font-weight:bold;');
        } else {
            console.log('%c[Cache] MISS 🔄 DB 조회 후 캐시 저장', 'color:#f97316; font-weight:bold;');
        }
        return r.ok ? r.json() : [];
    })
    .then(pins => renderPins(pins))
    .catch(err => console.error('初期ピン取得エラー:', err));
});

/* =========================================================
   GPS
========================================================= */
if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
        pos => {
            const myLat = pos.coords.latitude;
            const myLng = pos.coords.longitude;

            isProgrammaticMove = true;
            map.setView([myLat, myLng], DEFAULT_ZOOM);

            L.circleMarker([myLat, myLng], {
                radius: 10,
                color: '#4F7F68',
                fillColor: '#6FAF8F',
                fillOpacity: 0.6,
                weight: 2
            }).bindPopup('<b>📍 現在地</b>').addTo(map);

            filterState.centerLat = myLat;
            filterState.centerLng = myLng;
            filterState.radius    = INIT_RADIUS || filterState.radius;

            applyFilter();
        },
        err => console.info('[Deu-Shu] GPS拒否 → リージョン座標維持:', REGION_NAME, err.message)
    );
}

/* =========================================================
   moveend
========================================================= */
map.on('moveend', function () {
    if (isProgrammaticMove) {
        isProgrammaticMove = false;
        return;
    }

    clearTimeout(moveTimer);
    moveTimer = setTimeout(async () => {
        await reloadPinsAndList();
    }, 300);
});

/* =========================================================
   IntersectionObserver
========================================================= */
const observer = new IntersectionObserver(
    entries => {
        if (entries[0].isIntersecting) {
            loadNextPage();
        }
    },
    {
        root: listContainer,
        rootMargin: '0px',
        threshold: 0
    }
);

observer.observe(sentinel);

/* =========================================================
   필터 UI 이벤트
========================================================= */
const filterBtn = document.getElementById('btn-apply-filter');
if (filterBtn) {
    filterBtn.addEventListener('click', function () {
        applyFilter();
    });
}

/* =========================================================
   즐겨찾기
========================================================= */
async function toggleFavoriteFromPopup(button) {
    const storeId = button.getAttribute('data-store-id');
    if (!storeId) return;

    try {
        const res = await fetch(`/api/stores/${storeId}/favorite/toggle`, {
            method: 'POST',
            headers: { 'X-Requested-With': 'XMLHttpRequest' }
        });

        if (res.status === 401) {
            alert('お気に入りはログイン後にご利用いただけます。');
            return;
        }

        if (!res.ok) {
            console.error('お気に入りトグル失敗', res.status);
            return;
        }

        const data  = await res.json();
        const isFav = !!data.favorited;

        button.dataset.favorited = isFav ? 'true' : 'false';
        const icon = button.querySelector('.fav-icon');

        if (isFav) {
            button.classList.add('is-fav');
            icon.textContent = '♥';
        } else {
            button.classList.remove('is-fav');
            icon.textContent = '♡';
        }
    } catch (err) {
        console.error('お気に入りトグル中エラー', err);
    }
}
