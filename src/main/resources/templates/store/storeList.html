<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Deu-Shu | 今日の閉店割引</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous"/>
    <!-- Leaflet CSS -->
	<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      crossorigin=""/>

    <link rel="stylesheet" th:href="@{/css/style.css}">

    <style>
        :root {
            --primary-sage:      #6FAF8F;
            --primary-sage-deep: #4F7F68;
            --bg-main:           #FAFAF8;
            --bg-soft:           #F1F1EF;
            --text-main:         #2F2F2F;
            --text-sub:          #6B6B6B;
            --border-soft:       #E0E0E0;
            --warning:           #FF9800;
            --error:             #D32F2F;
        }
        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        main { margin-top: 30px; }

        /* ── Hero ── */
        .hero-section { background-color: var(--bg-soft); }
        .hero-sub     { color: var(--text-sub); font-size: 0.9rem; }

        /* ══════════════════════════════════════
           FR-M04 필터 바
        ══════════════════════════════════════ */
        .filter-bar {
            background: #fff;
            border: 1px solid var(--border-soft);
            border-radius: 1rem;
            padding: 0.75rem 1rem;
        }
        /* 카테고리 아이콘 버튼 */
        .cat-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            background: var(--bg-soft);
            border: 2px solid transparent;
            border-radius: 0.75rem;
            padding: 0.4rem 0.7rem;
            font-size: 0.72rem;
            color: var(--text-sub);
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .cat-btn .cat-icon { font-size: 1.3rem; line-height: 1; }
        .cat-btn:hover,
        .cat-btn.active {
            border-color: var(--primary-sage-deep);
            background: #e8f4ef;
            color: var(--primary-sage-deep);
            font-weight: 600;
        }
        /* 정렬 버튼 */
        .sort-btn {
            background: var(--bg-soft);
            border: 2px solid transparent;
            border-radius: 999px;
            padding: 0.25rem 0.75rem;
            font-size: 0.78rem;
            color: var(--text-sub);
            cursor: pointer;
            transition: all 0.15s;
        }
        .sort-btn.active,
        .sort-btn:hover {
            border-color: var(--primary-sage-deep);
            background: #e8f4ef;
            color: var(--primary-sage-deep);
            font-weight: 600;
        }
        /* 필터 옵션 패널 (접기/펼치기) */
        #filter-detail {
            border-top: 1px solid var(--border-soft);
            margin-top: 0.6rem;
            padding-top: 0.6rem;
        }
        .filter-label { font-size: 0.78rem; color: var(--text-sub); margin-bottom: 4px; }

        /* ══════════════════════════════════════
           지도 패널
        ══════════════════════════════════════ */
        .panel        { background-color: #fff; border-radius: 1rem; border: 1px solid var(--border-soft); }
        .panel-header { border-bottom: 1px solid var(--border-soft); }
        #map {
            width: 100%; height: 480px;
            border-radius: 0 0 1rem 1rem;
            z-index: 0;
        }
        /* 지도 팝업 */
        .leaflet-popup-content-wrapper {
            border-radius: 0.75rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
        }
        .map-popup-title { font-weight: 700; font-size: 0.9rem; color: var(--text-main); }
        .map-popup-sub   { font-size: 0.78rem; color: var(--text-sub); margin-top: 2px; }
        .map-popup-price { font-size: 0.85rem; font-weight: 600; color: var(--primary-sage-deep); margin-top: 4px; }
        /* 지도 팝업 */
        .leaflet-popup-content-wrapper {
            border-radius: 0.75rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
        }
        .map-popup-title { font-weight: 700; font-size: 0.9rem; color: var(--text-main); }
        .map-popup-sub   { font-size: 0.78rem; color: var(--text-sub); margin-top: 2px; }
        .map-popup-price { font-size: 0.85rem; font-weight: 600; color: var(--primary-sage-deep); margin-top: 4px; }

        /* 팝업 즐겨찾기 버튼 */
        .map-popup-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
        }
        .fav-btn {
            border: none;
            background: transparent;
            padding: 0;
            cursor: pointer;
            font-size: 1.1rem;
            line-height: 1;
        }
        .fav-btn .fav-icon {
            display: inline-block;
            transition: transform 0.15s ease;
        }
        .fav-btn.is-fav .fav-icon {
            color: #E53935; /* 채워진 하트 색상 */
        }
        .fav-btn:hover .fav-icon {
            transform: scale(1.1);
        }


        /* ══════════════════════════════════════
           가게 카드 / 리스트
        ══════════════════════════════════════ */
        #store-list-container {
            overflow-y: auto;
            max-height: 480px;
            scroll-behavior: smooth;
        }
        #store-list-container::-webkit-scrollbar { width: 4px; }
        #store-list-container::-webkit-scrollbar-track { background: transparent; }
        #store-list-container::-webkit-scrollbar-thumb { background: var(--border-soft); border-radius: 4px; }

        .store-card {
            background-color: var(--bg-soft);
            border-radius: 0.75rem;
            border: none;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .store-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }
        .store-thumb {
            width: 64px; height: 64px;
            border-radius: 0.75rem;
            background-color: #D3D3D3;
            object-fit: cover;
            flex-shrink: 0;
        }
        .price-discount { color: var(--primary-sage-deep); font-weight: 600; }
        .price-original { color: #9E9E9E; text-decoration: line-through; font-size: 0.8rem; }
        .badge-warning-custom { background-color: var(--warning); }
        .badge-error-custom   { background-color: var(--error); }

        /* 로딩 스피너 */
        #scroll-loader {
		    display: none;
		    padding: 1rem 0;
		}
        .spinner-sage {
            width: 24px; height: 24px;
            border: 3px solid var(--border-soft);
            border-top-color: var(--primary-sage);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #list-end-msg { display: none; font-size: 0.8rem; color: var(--text-sub); padding: 1rem 0; }

        /* ── 공통 버튼 ── */
        .btn-primary-sage {
            background-color: var(--primary-sage-deep);
            border-color: var(--primary-sage-deep);
            color: #fff;
        }
        .btn-primary-sage:hover {
            background-color: var(--primary-sage);
            border-color: var(--primary-sage);
            color: #fff;
        }
        .filter-pill {
            background-color: var(--primary-sage);
            color: #fff;
            font-size: 0.75rem;
            border-radius: 999px;
            padding: 0.2rem 0.75rem;
        }
    </style>
</head>
<body>

<!-- 헤더 조각 -->
<div th:replace="~{fragments/header :: header}"></div>

<main>

    <!-- ══════════════════════════════════════════════════════════════
         Hero 영역
    ══════════════════════════════════════════════════════════════ -->


    <!-- ══════════════════════════════════════════════════════════════
         FR-M04  필터 바 (지도+리스트 섹션 위에 배치)
    ══════════════════════════════════════════════════════════════ -->
   <section class="pt-3 pb-1">
    <div class="container">
        <div class="filter-bar">

            <!-- 1행: 카테고리 아이콘 버튼 + 정렬 + 필터 더보기 -->
            <div class="d-flex flex-wrap align-items-center gap-2">

                <!-- 카테고리 버튼 -->
                <button class="cat-btn active" data-category="" onclick="selectCategory(this)">
                    <span class="cat-icon">🏪</span>すべて
                </button>
                <button class="cat-btn" data-category="BAKERY" onclick="selectCategory(this)">
                    <span class="cat-icon">🥐</span>ベーカリー
                </button>
                <button class="cat-btn" data-category="LUNCHBOX" onclick="selectCategory(this)">
                    <span class="cat-icon">🍱</span>弁当
                </button>
                <button class="cat-btn" data-category="CAFE" onclick="selectCategory(this)">
                    <span class="cat-icon">☕</span>カフェ
                </button>
                <button class="cat-btn" data-category="SUSHI" onclick="selectCategory(this)">
                    <span class="cat-icon">🍣</span>寿司
                </button>
                <button class="cat-btn" data-category="SIDEDISH" onclick="selectCategory(this)">
                    <span class="cat-icon">🥗</span>おかず
                </button>

                <!-- 구분선 -->
                <div class="vr mx-1 d-none d-sm-block" style="height:32px;"></div>

                <!-- 정렬 버튼 -->
                <button class="sort-btn active" data-sort="stock" onclick="selectSort(this)">🔥 まもなく終了</button>
                <button class="sort-btn" data-sort="discountRate" onclick="selectSort(this)">💸 割引率↑</button>
                <button class="sort-btn" data-sort="distance" onclick="selectSort(this)">📍 距離順</button>

                <!-- 구분선 -->
                <div class="vr mx-1 d-none d-sm-block" style="height:32px;"></div>

                <!-- 상세 필터 토글 버튼 -->
                <button class="sort-btn ms-auto" type="button"
                        data-bs-toggle="collapse" data-bs-target="#filter-detail"
                        aria-expanded="false" aria-controls="filter-detail">
                    ⚙ 詳細フィルター
                </button>
            </div>

            <!-- 2행: 상세 필터 (접기/펼치기) -->
            <div class="collapse" id="filter-detail">
                <div class="row g-3 mt-1">

                    <!-- 최대 가격 -->
                    <div class="col-6 col-md-3">
                        <div class="filter-label">最大割引価格 (¥)</div>
                        <input type="number" id="f-max-price" class="form-control form-control-sm"
                               placeholder="例: 800"
                               min="0" step="100"
                               oninput="scheduleFilterApply()"/>
                    </div>

                    <!-- 최소 할인율 -->
                    <div class="col-6 col-md-3">
                        <div class="filter-label">最低割引率 (%)</div>
                        <input type="range" id="f-min-rate" class="form-range" min="0" max="70" step="10" value="0"
                               oninput="document.getElementById('f-min-rate-val').textContent=this.value+'%'; scheduleFilterApply()"/>
                        <div class="text-center small text-muted">
                            <span id="f-min-rate-val">0%</span>以上
                        </div>
                    </div>

                    <!-- 마감 시간 이내 -->
                    <div class="col-6 col-md-3">
                        <div class="filter-label">閉店時間まで残り</div>
                        <select id="f-expire" class="form-select form-select-sm"
                                onchange="scheduleFilterApply()">
                            <option value="">すべて</option>
                            <option value="60">1時間以内</option>
                            <option value="120">2時間以内</option>
                            <option value="180">3時間以内</option>
                        </select>
                    </div>

                    <!-- 조회 반경 -->
                    <div class="col-6 col-md-3">
                        <div class="filter-label">検索半径 (km)</div>
                        <select id="f-radius" class="form-select form-select-sm"
                                onchange="scheduleFilterApply()">
                            <option value="">すべて</option>
                            <option value="1">1km</option>
                            <option value="2">2km</option>
                            <option value="5">5km</option>
                            <option value="10">10km</option>
                        </select>
                    </div>

                    <!-- 필터 초기화 버튼 -->
                    <div class="col-12 d-flex justify-content-end">
                        <button class="btn btn-sm btn-outline-secondary rounded-pill px-3"
                                onclick="resetFilters()">
                            ↺ フィルターをリセット
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>
</section>

<!-- ══════════════════════════════════════════════════════════════
     지도 + 리스트 영역
══════════════════════════════════════════════════════════════ -->
<section class="py-3 py-md-4">
    <div class="container">
        <div class="row g-3 g-lg-4">

            <!-- ── 좌측: 지도 패널 ── -->
            <div class="col-lg-7">
                <div class="panel h-100 d-flex flex-column">
                    <div class="panel-header px-3 px-md-4 py-2 d-flex justify-content-between align-items-center">
                            <span class="small text-muted" id="map-region-label">
                                <!-- Thymeleaf 지역명 표시 -->
                                <span th:text="${regionName} ?: '全地域'">全地域</span> タイムセール店舗
                            </span>
                        <span class="filter-pill d-none d-sm-inline" id="map-filter-label">
                                全カテゴリ
                            </span>
                    </div>
                    <!-- Leaflet 지도 -->
                    <div id="map"></div>
                </div>
            </div>

            <!-- ── 우측: 가게 리스트 패널 (무한스크롤) ── -->
            <div class="col-lg-5">
                <div class="panel h-100 d-flex flex-column">
                    <div class="panel-header px-3 px-md-4 py-2 d-flex justify-content-between align-items-center">
                        <span class="small text-muted">本日ピックアップ可能な店舗</span>
                        <span class="small text-muted" id="list-sort-label">在庫・締切間近順</span>
                    </div>
                    <div class="p-2 p-md-3 flex-grow-1 d-flex flex-column">
                        <div id="store-list-container" class="flex-grow-1">

                            <!--
                                서버 사이드 렌더링 초기 카드 (page=0)
                                StoreService.getStoresByPage(0, 10, lat, lng) 결과를 바인딩
                            -->
                            <div th:each="store : ${stores}"
                                 class="card store-card mb-2"
                                 th:data-store-id="${store.id}"
                                 th:data-lat="${store.lat}"
                                 th:data-lng="${store.lng}"
                                 onclick="focusMapPin(this)">
                                <div class="card-body d-flex">
                                    <img th:src="${store.thumbnailUrl} ?: '/img/default-store.png'"
                                         class="store-thumb me-3"
                                         th:alt="${store.name}"
                                         onerror="this.style.background='#D3D3D3'"/>
                                    <div class="flex-grow-1">
                                        <div class="d-flex justify-content-between align-items-start mb-1">
                                            <h6 class="mb-0" th:text="${store.name}">店舗名</h6>
                                            <span th:if="${store.totalStock > 5}"
                                                  class="badge bg-success text-white small"
                                                  th:text="'在庫余裕 · ' + ${store.totalStock}">
                                                    在庫余裕
                                                </span>
                                            <span th:if="${store.totalStock > 0 and store.totalStock <= 5}"
                                                  class="badge badge-warning-custom text-white small"
                                                  th:text="'まもなく終了 · 在庫 ' + ${store.totalStock}">
                                                    まもなく終了 · 在庫
                                                </span>
                                            <span th:if="${store.totalStock == 0}"
                                                  class="badge badge-error-custom text-white small">
                                                    売り切れ
                                                </span>
                                        </div>
                                        <div class="text-muted small mb-1">
                                            <span th:text="${store.category}">BAKERY</span>
                                            · 本日 <span th:text="${store.closeTime}">22:00</span> 閉店
                                        </div>
                                        <div class="d-flex align-items-center gap-2">
                                            <span class="price-discount"
                                                  th:text="'¥' + ${#numbers.formatInteger(store.minDiscountPrice, 3, 'COMMA')}">
                                                    ¥4,000
                                                </span>
                                            <span class="price-original"
                                                  th:text="'¥' + ${#numbers.formatInteger(store.minOriginalPrice, 3, 'COMMA')}">
                                                    ¥8,000
                                                </span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- 무한스크롤 센티넬 -->
                            <div id="scroll-sentinel"></div>
                            <div id="scroll-loader" class="d-flex justify-content-center">
                                <div class="spinner-sage"></div>
                            </div>
                            <div id="list-end-msg" class="text-center">
                                周辺のすべての店舗を読み込みました
                            </div>

                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</section>

</main>


<!-- 푸터 조각 -->
<div th:replace="~{fragments/footer :: footer}"></div>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        crossorigin=""></script>


<script th:inline="javascript">
/*<![CDATA[*/

    /* ══════════════════════════════════════════════════════════════
       Thymeleaf → JS 데이터 주입
       ListController 에서 model.addAttribute 로 넘겨준 값 사용
    ══════════════════════════════════════════════════════════════ */
    const REGION_LAT   = /*[[${centerLat}]]*/ 35.6812;
    const REGION_LNG   = /*[[${centerLng}]]*/ 139.7671;
    const REGION_NAME  = /*[[${regionName}]]*/ '東京駅周辺';
    const REGION_CODE  = /*[[${regionCode}]]*/ '';
    const DEFAULT_ZOOM = 15;

    /* 서버에서 JSON 직렬화된 초기 핀 데이터 (StoreService.getStorePins 결과)
       ListController 에서 model.addAttribute("storePins", ...) 로 주입 */
    const serverPins = /*[[${storePins}]]*/ [];

    /* ══════════════════════════════════════════════════════════════
       [요구사항 1] URL 파라미터에서 radius 읽기
       index.html nav 버튼 → /list?region=XXX&radius=2 로 진입 시
       radius=2 가 기본값으로 설정됨.
       URL에 radius가 없으면 null (= 반경 제한 없음).
    ══════════════════════════════════════════════════════════════ */
    const urlParams    = new URLSearchParams(window.location.search);
    const INIT_RADIUS  = urlParams.get('radius') ? parseFloat(urlParams.get('radius')) : null;
    /* 현재 적용 중인 반경 (지도 이동 시 동적 업데이트) */
    let   currentRadius = INIT_RADIUS;

    /* ══════════════════════════════════════════════════════════════
       1. Leaflet 지도 초기화
    ══════════════════════════════════════════════════════════════ */
    const map = L.map('map').setView([REGION_LAT, REGION_LNG], DEFAULT_ZOOM);

    // 팝업이 열릴 때 즐겨찾기 상태를 서버에서 가져와 하트 UI 반영
    map.on('popupopen', async function (e) {
        const popupEl = e.popup.getElement();
        if (!popupEl) return;
        const btn = popupEl.querySelector('.fav-btn');
        if (!btn) return;
        const storeId = btn.getAttribute('data-store-id');
        if (!storeId) return;
        try {
            const res = await fetch(`/api/stores/${storeId}`);
            if (!res.ok) return;
            const detail = await res.json();
            const isFav  = !!detail.favorited;
            btn.dataset.favorited = isFav ? 'true' : 'false';
            if (isFav) {
                btn.classList.add('is-fav');
                btn.querySelector('.fav-icon').textContent = '♥';
            } else {
                btn.classList.remove('is-fav');
                btn.querySelector('.fav-icon').textContent = '♡';
            }
        } catch (err) {
            console.error('お気に入り状態取得エラー:', err);
        }
    });

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        maxZoom: 19
    }).addTo(map);

    /* ── 커스텀 마커 (재고 상태별 색상) ── */
    function createMarkerIcon(stock) {
        const color = stock === 0 ? '#D32F2F'
                    : stock <= 5 ? '#FF9800'
                    : '#4F7F68';
        return L.divIcon({
            className: '',
            html: `<div style="width:32px;height:32px;border-radius:50% 50% 50% 0;
                               background:${color};border:2px solid #fff;
                               transform:rotate(-45deg);
                               box-shadow:0 2px 8px rgba(0,0,0,0.25);"></div>`,
            iconSize: [32, 32], iconAnchor: [16, 32], popupAnchor: [0, -36]
        });
    }

    /* ── 팝업 HTML ── */
    function buildPopup(pin) {
        const stockBadge = pin.totalStock === 0
            ? '<span style="color:#D32F2F;font-weight:700;">売り切れ</span>'
            : pin.totalStock <= 5
                ? `<span style="color:#FF9800;font-weight:700;">在庫 ${pin.totalStock}個</span>`
                : `<span style="color:#4F7F68;font-weight:700;">在庫余裕 ${pin.totalStock}+</span>`;

        return `
            <div style="min-width:180px;">
              <div class="map-popup-header">
                <div>
                  <div class="map-popup-title">${pin.name}</div>
                  <div class="map-popup-sub">${pin.category} · 本日 ${pin.closeTime} 閉店</div>
                </div>
                <button type="button"
                        class="fav-btn"
                        data-store-id="${pin.id}"
                        data-favorited="false"
                        onclick="toggleFavoriteFromPopup(this)">
                  <span class="fav-icon">♡</span>
                </button>
              </div>
              <div class="map-popup-price">
                ¥${Number(pin.minDiscountPrice).toLocaleString()} &nbsp;${stockBadge}
              </div>
              <a href="/store/${pin.id}"
                 style="display:block;margin-top:8px;text-align:center;
                        background:#4F7F68;color:#fff;border-radius:6px;
                        padding:4px 0;font-size:0.8rem;text-decoration:none;">
                 詳細を見る
              </a>
            </div>`;
    }

    /* ── 마커 컬렉션 ── */
    const markerMap = {};

    function renderPins(pins) {
        pins.forEach(pin => {
            if (markerMap[pin.id]) return; // 중복 방지
            const marker = L.marker([pin.lat, pin.lng], { icon: createMarkerIcon(pin.totalStock) })
                .bindPopup(buildPopup(pin), { maxWidth: 220 })
                .addTo(map);
            markerMap[pin.id] = marker;
        });
    }

    /* ── 초기 핀 렌더링 ── */
    if (serverPins && serverPins.length > 0) {
        renderPins(serverPins);
    } else {
        /* 서버 렌더링 핀이 없을 때 클라이언트에서 직접 조회
           [요구사항 1] INIT_RADIUS가 있으면 해당 반경 내 가게만 핀 표시 */
        (async () => {
            try {
                let url = `/api/stores/pins?centerLat=${REGION_LAT}&centerLng=${REGION_LNG}`;
                if (INIT_RADIUS) url += `&radius=${INIT_RADIUS}`;
                const resp = await fetch(url);
                if (resp.ok) renderPins(await resp.json());
            } catch (err) {
                console.error('初期ピン取得エラー:', err);
            }
        })();
    }

    /* ── GPS (허용 시 내 위치로 이동) ── */
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            pos => {
                map.setView([pos.coords.latitude, pos.coords.longitude], DEFAULT_ZOOM);
                L.circleMarker([pos.coords.latitude, pos.coords.longitude], {
                    radius: 10, color: '#4F7F68', fillColor: '#6FAF8F', fillOpacity: 0.6, weight: 2
                }).bindPopup('<b>📍 現在地</b>').addTo(map);
            },
            () => console.info('[Deu-Shu] GPS拒否 → リージョン座標維持:', REGION_NAME)
        );
    }

    /* ── 카드 클릭 → 지도 핀 포커스 ── */
    function focusMapPin(cardEl) {
        const id  = parseInt(cardEl.dataset.storeId, 10);
        const lat = parseFloat(cardEl.dataset.lat);
        const lng = parseFloat(cardEl.dataset.lng);
        if (lat && lng) map.flyTo([lat, lng], 16, { animate: true, duration: 0.8 });
        if (markerMap[id]) markerMap[id].openPopup();
    }

    /* ── 지도 핀 전체 교체 (필터/이동 후 사용) ── */
    function replacePins(pins) {
        Object.values(markerMap).forEach(m => map.removeLayer(m));
        Object.keys(markerMap).forEach(k => delete markerMap[k]);
        renderPins(pins);
    }

    /* ══════════════════════════════════════════════════════════════
       [요구사항 4] 지도 이동(moveend) 이벤트 처리
       지도를 이동하면 현재 보이는 영역(Bbox) 기준으로
       핀과 리스트를 모두 업데이트한다.
       debounce 300ms 적용 - 빠른 이동 시 API 중복 호출 방지.
    ══════════════════════════════════════════════════════════════ */
    let moveTimer = null;

    map.on('moveend', function () {
        clearTimeout(moveTimer);
        moveTimer = setTimeout(async () => {
            const bounds = map.getBounds();
            const sw     = bounds.getSouthWest();
            const ne     = bounds.getNorthEast();
            const center = map.getCenter();

            /* 현재 지도 중심 좌표를 filterState에도 갱신 */
            filterState.centerLat = center.lat;
            filterState.centerLng = center.lng;

            try {
                /* Bbox API로 현재 뷰포트 내 핀 조회 */
                const pinUrl = `/api/stores/pins/bbox`
                    + `?minLat=${sw.lat}&maxLat=${ne.lat}`
                    + `&minLng=${sw.lng}&maxLng=${ne.lng}`;
                const pinResp = await fetch(pinUrl);
                if (pinResp.ok) {
                    const pins = await pinResp.json();
                    replacePins(pins);
                }

                /* 리스트도 현재 중심 + 보이는 범위 반경으로 업데이트
                   반경: 지도 중심 ~ NE 모서리 거리(km) 계산 */
                currentRadius = calcRadiusFromBounds(center, ne);
                resetListForNewRegion(center.lat, center.lng, currentRadius);

            } catch (err) {
                console.error('地図移動後の更新エラー:', err);
            }
        }, 300);
    });

    /**
     * 지도 중심~NE 모서리 거리(km) 계산 (Haversine 간략 버전)
     * 이 값을 radius로 사용하면 현재 보이는 영역이 모두 커버됨.
     */
    function calcRadiusFromBounds(center, ne) {
        const R    = 6371;
        const dLat = (ne.lat - center.lat) * Math.PI / 180;
        const dLng = (ne.lng - center.lng) * Math.PI / 180;
        const a    = Math.sin(dLat/2) * Math.sin(dLat/2)
                   + Math.cos(center.lat * Math.PI / 180)
                   * Math.cos(ne.lat    * Math.PI / 180)
                   * Math.sin(dLng/2)   * Math.sin(dLng/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    /**
     * [요구사항 4] 새 지역/반경으로 리스트 초기화
     * 기존 카드 전체 삭제 후 page=0부터 다시 로드
     */
    function resetListForNewRegion(lat, lng, radius) {
        /* 기존 카드 제거 (sentinel 이전 노드만 삭제, sentinel 중복 선언 제거) */
        let child = listContainer.firstChild;
        while (child && child !== sentinel) {
            const next = child.nextSibling;
            listContainer.removeChild(child);
            child = next;
        }

        /* 무한스크롤 상태 초기화 */
        currentPage = 0;
        isListEnd   = false;
        loader.style.display  = 'none';
        endMsg.style.display  = 'none';

        /* [버그 2 수정] observer 재등록 - unobserve 상태 복원 */
        observer.observe(sentinel);

        /* 첫 페이지 즉시 로드 */
        loadNextPage(lat, lng, radius);
    }


    /* ══════════════════════════════════════════════════════════════
       2. FR-M04 필터 상태 + API 호출
    ══════════════════════════════════════════════════════════════ */
    const filterState = {
        category:            '',
        sortBy:              'stock',
        maxDiscountPrice:    null,
        minDiscountRate:     0,
        expireWithinMinutes: null,
        radius:              INIT_RADIUS,   // [요구사항 1] URL 파라미터 radius 초기값
        centerLat:           REGION_LAT,
        centerLng:           REGION_LNG
    };

    let filterTimer = null;

    /* debounce: 입력이 멈춘 후 500ms 뒤 필터 적용 */
    function scheduleFilterApply() {
        clearTimeout(filterTimer);
        filterTimer = setTimeout(applyFilter, 500);
    }

    /* 카테고리 선택 */
    function selectCategory(btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filterState.category = btn.dataset.category;
        document.getElementById('map-filter-label').textContent =
            btn.dataset.category ? btn.textContent.trim() : '全カテゴリ';
        applyFilter();
    }

    /* 정렬 선택 */
    function selectSort(btn) {
        document.querySelectorAll('.sort-btn[data-sort]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filterState.sortBy = btn.dataset.sort;
        /* 정렬 레이블 일본어 */
        const labels = {
            stock:        '在庫・締切間近順',
            discountRate: '割引率の高い順',
            distance:     '距離が近い順'
        };
        document.getElementById('list-sort-label').textContent = labels[filterState.sortBy] || '並び替え';
        applyFilter();
    }

    /* 필터 초기화 */
    function resetFilters() {
        document.getElementById('f-max-price').value  = '';
        document.getElementById('f-min-rate').value   = '0';
        document.getElementById('f-min-rate-val').textContent = '0%';
        document.getElementById('f-expire').value     = '';
        document.getElementById('f-radius').value     = '';

        filterState.maxDiscountPrice    = null;
        filterState.minDiscountRate     = 0;
        filterState.expireWithinMinutes = null;
        filterState.radius              = INIT_RADIUS;  // [요구사항 1] 초기화 시 URL 반경으로 복원

        applyFilter();
    }

    /* 필터 API 호출 → 핀 + 리스트 교체 */
    async function applyFilter() {
        filterState.maxDiscountPrice    = document.getElementById('f-max-price').value  || null;
        filterState.minDiscountRate     = document.getElementById('f-min-rate').value   || 0;
        filterState.expireWithinMinutes = document.getElementById('f-expire').value     || null;
        /* 상세 필터 반경 입력이 있으면 우선 적용, 없으면 현재 radius 유지 */
        const inputRadius = document.getElementById('f-radius').value;
        filterState.radius = inputRadius ? parseFloat(inputRadius) : currentRadius;

        const params = new URLSearchParams();
        if (filterState.category)            params.set('category',            filterState.category);
        if (filterState.sortBy)              params.set('sortBy',              filterState.sortBy);
        if (filterState.maxDiscountPrice)    params.set('maxDiscountPrice',    filterState.maxDiscountPrice);
        if (filterState.minDiscountRate > 0) params.set('minDiscountRate',     filterState.minDiscountRate);
        if (filterState.expireWithinMinutes) params.set('expireWithinMinutes', filterState.expireWithinMinutes);
        if (filterState.radius)              params.set('radius',              filterState.radius);
        params.set('centerLat', filterState.centerLat);
        params.set('centerLng', filterState.centerLng);

        try {
            const resp = await fetch(`/api/stores/filter?${params.toString()}`);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const pins = await resp.json();
            replacePins(pins);
            replaceListCards(pins);
        } catch (err) {
            console.error('[FR-M04] フィルター適用エラー:', err);
        }
    }

    /* 리스트 카드 전체 교체 (필터 결과) */
    function replaceListCards(stores) {
        const container = document.getElementById('store-list-container');
        const sentinel  = document.getElementById('scroll-sentinel');
        let child = container.firstChild;
        while (child && child !== sentinel) {
            const next = child.nextSibling;
            container.removeChild(child);
            child = next;
        }

        if (stores.length === 0) {
            sentinel.insertAdjacentHTML('beforebegin',
                '<div class="text-center text-muted small py-3">条件に合う店舗が見つかりません。</div>');
            return;
        }

        stores.forEach(store => {
            sentinel.insertAdjacentHTML('beforebegin', buildCardHtml(store));
        });

        /* 필터 모드에서는 무한스크롤 비활성화 */
        isListEnd = true;
        document.getElementById('list-end-msg').style.display = 'none';
    }


    /* ══════════════════════════════════════════════════════════════
       3. [요구사항 3] 무한 스크롤 (IntersectionObserver)
       GET /api/stores?page=N&size=10&centerLat=&centerLng=&radius=2
       radius 파라미터 추가 → 반경 내 가게만 리스트에 표시
    ══════════════════════════════════════════════════════════════ */
    let currentPage = 1;   // page 0은 서버 렌더링으로 처리
    let isFetching  = false;
    let isListEnd   = false;
    const PAGE_SIZE = 10;

    const sentinel      = document.getElementById('scroll-sentinel');
    const loader        = document.getElementById('scroll-loader');
    const endMsg        = document.getElementById('list-end-msg');
    const listContainer = document.getElementById('store-list-container');

    /* ── 카드 HTML 빌더 (모든 텍스트 일본어) ── */
    function buildCardHtml(store) {
        const stockBadge = store.totalStock === 0
            ? `<span class="badge badge-error-custom text-white small">売り切れ</span>`
            : store.totalStock <= 5
                ? `<span class="badge badge-warning-custom text-white small">まもなく終了 · 在庫 ${store.totalStock}</span>`
                : `<span class="badge bg-success text-white small">在庫余裕 · ${store.totalStock}+</span>`;
        const thumb = store.thumbnailUrl || '/img/default-store.png';
        return `
        <div class="card store-card mb-2"
             data-store-id="${store.id}" data-lat="${store.lat}" data-lng="${store.lng}"
             onclick="focusMapPin(this)">
            <div class="card-body d-flex">
                <img src="${thumb}" class="store-thumb me-3" alt="${store.name}"
                     onerror="this.style.background='#D3D3D3';this.removeAttribute('src')"/>
                <div class="flex-grow-1">
                    <div class="d-flex justify-content-between align-items-start mb-1">
                        <h6 class="mb-0">${store.name}</h6>${stockBadge}
                    </div>
                    <div class="text-muted small mb-1">
                        ${store.category} · 本日 ${store.closeTime} 閉店
                    </div>
                    <div class="d-flex align-items-center gap-2">
                        <span class="price-discount">¥${Number(store.minDiscountPrice).toLocaleString()}</span>
                        <span class="price-original">¥${Number(store.minOriginalPrice).toLocaleString()}</span>
                    </div>
                </div>
            </div>
        </div>`;
    }

    async function loadNextPage() {

        if (isFetching || isListEnd) return;

        isFetching = true;

        // 로딩 표시
        loader.style.display = 'flex';

        try {

            const url = `/api/stores?page=${currentPage}&size=${PAGE_SIZE}`
                      + `&centerLat=${REGION_LAT}&centerLng=${REGION_LNG}`;

            const resp = await fetch(url);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

            const data = await resp.json();

            // 데이터가 없는 경우
            if (!data.content || data.content.length === 0) {
                isListEnd = true;
                loader.style.display = 'none';
                endMsg.style.display = 'block';
                observer.unobserve(sentinel);
                return;
            }

            data.content.forEach(store => {

                sentinel.insertAdjacentHTML('beforebegin', buildCardHtml(store));

                if (!markerMap[store.id]) {
                    const marker = L.marker(
                        [store.lat, store.lng],
                        { icon: createMarkerIcon(store.totalStock) }
                    )
                    .bindPopup(buildPopup(store))
                    .addTo(map);

                    markerMap[store.id] = marker;
                }

            });

            currentPage++;

            // 마지막 페이지 체크
            if (data.last === true || data.content.length < PAGE_SIZE) {

                isListEnd = true;

                // 로딩 숨김
                loader.style.display = 'none';

                // 끝 메시지 표시
                endMsg.style.display = 'block';

                // observer 중지
                observer.unobserve(sentinel);

                return;
            }

        } catch (err) {

            console.error('[InfiniteScroll] 오류:', err);

            loader.style.display = 'none';

        } finally {

            isFetching = false;

            // 다음 요청을 위해 loader 숨김
            if (!isListEnd) {
                loader.style.display = 'none';
            }
        }
    }

   
    const observer = new IntersectionObserver(
        entries => { if (entries[0].isIntersecting) loadNextPage(); },
        { root: listContainer, rootMargin: '0px', threshold: 0 }
    );
    observer.observe(sentinel);

    /* ── 즐겨찾기 토글 (팝업 하트 버튼) ── */
    async function toggleFavoriteFromPopup(button) {
        const storeId = button.getAttribute('data-store-id');
        if (!storeId) return;

        try {
            const res = await fetch(`/api/stores/${storeId}/favorite/toggle`, {
                method: 'POST',
                headers: { 'X-Requested-With': 'XMLHttpRequest' }
            });

            if (res.status === 401) {
                alert('お気に入りはログイン後にご利用いただけます。');
                return;
            }
            if (!res.ok) {
                console.error('お気に入りトグル失敗', res.status);
                return;
            }

            const data  = await res.json();
            const isFav = !!data.favorited;
            button.dataset.favorited = isFav ? 'true' : 'false';
            const icon = button.querySelector('.fav-icon');
            if (isFav) {
                button.classList.add('is-fav');
                icon.textContent = '♥';
            } else {
                button.classList.remove('is-fav');
                icon.textContent = '♡';
            }
        } catch (err) {
            console.error('お気に入りトグル中エラー', err);
        }
    }

/*]]>*/
</script>
</body>
